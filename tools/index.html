<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kingshot Gift Code Front Test</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      padding:24px;
      font-family:Arial,sans-serif;
      background:#111827;
      color:#f9fafb;
    }
    .wrap{
      max-width:760px;
      margin:0 auto;
    }
    h1{
      margin:0 0 8px;
      font-size:28px;
    }
    .desc{
      margin:0 0 24px;
      color:#cbd5e1;
      line-height:1.6;
    }
    .card{
      background:#1f2937;
      border:1px solid #374151;
      border-radius:16px;
      padding:20px;
      margin-bottom:16px;
    }
    label{
      display:block;
      font-size:14px;
      font-weight:700;
      margin-bottom:8px;
    }
    input, select{
      width:100%;
      padding:14px 16px;
      border-radius:12px;
      border:1px solid #4b5563;
      background:#111827;
      color:#f9fafb;
      font-size:15px;
      margin-bottom:14px;
    }
    input:focus, select:focus{
      outline:none;
      border-color:#60a5fa;
    }
    .btn-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    button{
      border:0;
      border-radius:12px;
      padding:14px 18px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
    }
    .btn-primary{
      background:#2563eb;
      color:#fff;
    }
    .btn-secondary{
      background:#374151;
      color:#fff;
    }
    .btn-ghost{
      background:#0f172a;
      color:#cbd5e1;
      border:1px solid #334155;
    }
    .result{
      white-space:pre-wrap;
      word-break:break-word;
      font-size:14px;
      line-height:1.7;
      background:#0f172a;
      border:1px solid #334155;
      border-radius:12px;
      padding:16px;
      min-height:140px;
    }
    .hint{
      font-size:13px;
      color:#94a3b8;
      margin-top:10px;
      line-height:1.6;
    }
    .ok{color:#86efac}
    .bad{color:#fca5a5}
    .muted{color:#94a3b8}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Kingshot Gift Code Front Test</h1>
    <p class="desc">
      coupons.json 연동 테스트 버전<br>
      순서: UID 입력 → coupons.json 불러오기 → 쿠폰 선택 → 플레이어 확인 → 쿠폰 등록
    </p>

    <div class="card">
      <label for="uid">UID / FID</label>
      <input id="uid" type="text" placeholder="예: 123456789" />

      <label for="couponSelect">쿠폰 선택</label>
      <select id="couponSelect">
        <option value="">쿠폰 목록 불러오는 중...</option>
      </select>

      <label for="couponInput">직접 입력용 쿠폰 코드</label>
      <input id="couponInput" type="text" placeholder="드롭다운 선택 또는 직접 입력" />

      <div class="btn-row">
        <button class="btn-ghost" id="reloadCouponsBtn" type="button">쿠폰 다시 불러오기</button>
        <button class="btn-primary" id="checkPlayerBtn" type="button">플레이어 확인</button>
        <button class="btn-primary" id="redeemBtn" type="button">쿠폰 등록 테스트</button>
        <button class="btn-secondary" id="clearBtn" type="button">결과 지우기</button>
      </div>

      <div class="hint">
        쿠폰은 <strong>./data/coupons.json</strong> 에서 읽어온다.<br>
        브라우저에서 직접 API 요청을 보내므로 CORS가 막히면 프론트만으로는 안 되고 백엔드가 필요하다.
      </div>
    </div>

    <div class="card">
      <strong>결과</strong>
      <div id="result" class="result">여기에 결과가 표시된다.</div>
    </div>
  </div>

  <script>
    const PLAYER_API = 'https://kingshot-giftcode.centurygame.com/api/player';
    const GIFT_API = 'https://kingshot-giftcode.centurygame.com/api/gift_code';
    const COUPONS_JSON_PATH = './data/coupons.json';
    const KS_ENCRYPT_KEY = 'mN4!pQs6JrYwV9';

    const uidInput = document.getElementById('uid');
    const couponSelect = document.getElementById('couponSelect');
    const couponInput = document.getElementById('couponInput');
    const resultBox = document.getElementById('result');
    const reloadCouponsBtn = document.getElementById('reloadCouponsBtn');
    const checkPlayerBtn = document.getElementById('checkPlayerBtn');
    const redeemBtn = document.getElementById('redeemBtn');
    const clearBtn = document.getElementById('clearBtn');

    function setResult(text, type = '') {
      resultBox.textContent = text;
      resultBox.className = 'result ' + type;
    }

    function md5cycle(x, k) {
      let [a, b, c, d] = x;
      a = ff(a, b, c, d, k[0], 7, -680876936);
      d = ff(d, a, b, c, k[1], 12, -389564586);
      c = ff(c, d, a, b, k[2], 17, 606105819);
      b = ff(b, c, d, a, k[3], 22, -1044525330);
      a = ff(a, b, c, d, k[4], 7, -176418897);
      d = ff(d, a, b, c, k[5], 12, 1200080426);
      c = ff(c, d, a, b, k[6], 17, -1473231341);
      b = ff(b, c, d, a, k[7], 22, -45705983);
      a = ff(a, b, c, d, k[8], 7, 1770035416);
      d = ff(d, a, b, c, k[9], 12, -1958414417);
      c = ff(c, d, a, b, k[10], 17, -42063);
      b = ff(b, c, d, a, k[11], 22, -1990404162);
      a = ff(a, b, c, d, k[12], 7, 1804603682);
      d = ff(d, a, b, c, k[13], 12, -40341101);
      c = ff(c, d, a, b, k[14], 17, -1502002290);
      b = ff(b, c, d, a, k[15], 22, 1236535329);

      a = gg(a, b, c, d, k[1], 5, -165796510);
      d = gg(d, a, b, c, k[6], 9, -1069501632);
      c = gg(c, d, a, b, k[11], 14, 643717713);
      b = gg(b, c, d, a, k[0], 20, -373897302);
      a = gg(a, b, c, d, k[5], 5, -701558691);
      d = gg(d, a, b, c, k[10], 9, 38016083);
      c = gg(c, d, a, b, k[15], 14, -660478335);
      b = gg(b, c, d, a, k[4], 20, -405537848);
      a = gg(a, b, c, d, k[9], 5, 568446438);
      d = gg(d, a, b, c, k[14], 9, -1019803690);
      c = gg(c, d, a, b, k[3], 14, -187363961);
      b = gg(b, c, d, a, k[8], 20, 1163531501);
      a = gg(a, b, c, d, k[13], 5, -1444681467);
      d = gg(d, a, b, c, k[2], 9, -51403784);
      c = gg(c, d, a, b, k[7], 14, 1735328473);
      b = gg(b, c, d, a, k[12], 20, -1926607734);

      a = hh(a, b, c, d, k[5], 4, -378558);
      d = hh(d, a, b, c, k[8], 11, -2022574463);
      c = hh(c, d, a, b, k[11], 16, 1839030562);
      b = hh(b, c, d, a, k[14], 23, -35309556);
      a = hh(a, b, c, d, k[1], 4, -1530992060);
      d = hh(d, a, b, c, k[4], 11, 1272893353);
      c = hh(c, d, a, b, k[7], 16, -155497632);
      b = hh(b, c, d, a, k[10], 23, -1094730640);
      a = hh(a, b, c, d, k[13], 4, 681279174);
      d = hh(d, a, b, c, k[0], 11, -358537222);
      c = hh(c, d, a, b, k[3], 16, -722521979);
      b = hh(b, c, d, a, k[6], 23, 76029189);
      a = hh(a, b, c, d, k[9], 4, -640364487);
      d = hh(d, a, b, c, k[12], 11, -421815835);
      c = hh(c, d, a, b, k[15], 16, 530742520);
      b = hh(b, c, d, a, k[2], 23, -995338651);

      a = ii(a, b, c, d, k[0], 6, -198630844);
      d = ii(d, a, b, c, k[7], 10, 1126891415);
      c = ii(c, d, a, b, k[14], 15, -1416354905);
      b = ii(b, c, d, a, k[5], 21, -57434055);
      a = ii(a, b, c, d, k[12], 6, 1700485571);
      d = ii(d, a, b, c, k[3], 10, -1894986606);
      c = ii(c, d, a, b, k[10], 15, -1051523);
      b = ii(b, c, d, a, k[1], 21, -2054922799);
      a = ii(a, b, c, d, k[8], 6, 1873313359);
      d = ii(d, a, b, c, k[15], 10, -30611744);
      c = ii(c, d, a, b, k[6], 15, -1560198380);
      b = ii(b, c, d, a, k[13], 21, 1309151649);
      a = ii(a, b, c, d, k[4], 6, -145523070);
      d = ii(d, a, b, c, k[11], 10, -1120210379);
      c = ii(c, d, a, b, k[2], 15, 718787259);
      b = ii(b, c, d, a, k[9], 21, -343485551);

      x[0] = add32(a, x[0]);
      x[1] = add32(b, x[1]);
      x[2] = add32(c, x[2]);
      x[3] = add32(d, x[3]);
    }

    function cmn(q, a, b, x, s, t) {
      a = add32(add32(a, q), add32(x, t));
      return add32((a << s) | (a >>> (32 - s)), b);
    }
    function ff(a, b, c, d, x, s, t) { return cmn((b & c) | ((~b) & d), a, b, x, s, t); }
    function gg(a, b, c, d, x, s, t) { return cmn((b & d) | (c & (~d)), a, b, x, s, t); }
    function hh(a, b, c, d, x, s, t) { return cmn(b ^ c ^ d, a, b, x, s, t); }
    function ii(a, b, c, d, x, s, t) { return cmn(c ^ (b | (~d)), a, b, x, s, t); }

    function md51(s) {
      const n = s.length;
      const state = [1732584193, -271733879, -1732584194, 271733878];
      let i;
      for (i = 64; i <= n; i += 64) {
        md5cycle(state, md5blk(s.substring(i - 64, i)));
      }
      s = s.substring(i - 64);
      const tail = new Array(16).fill(0);

      for (i = 0; i < s.length; i++) {
        tail[i >> 2] |= s.charCodeAt(i) << ((i % 4) << 3);
      }
      tail[i >> 2] |= 0x80 << ((i % 4) << 3);

      if (i > 55) {
        md5cycle(state, tail);
        for (i = 0; i < 16; i++) tail[i] = 0;
      }

      tail[14] = n * 8;
      md5cycle(state, tail);
      return state;
    }

    function md5blk(s) {
      const md5blks = [];
      for (let i = 0; i < 64; i += 4) {
        md5blks[i >> 2] =
          s.charCodeAt(i) +
          (s.charCodeAt(i + 1) << 8) +
          (s.charCodeAt(i + 2) << 16) +
          (s.charCodeAt(i + 3) << 24);
      }
      return md5blks;
    }

    const hexChr = '0123456789abcdef'.split('');
    function rhex(n) {
      let s = '';
      for (let j = 0; j < 4; j++) {
        s += hexChr[(n >> (j * 8 + 4)) & 0x0f] + hexChr[(n >> (j * 8)) & 0x0f];
      }
      return s;
    }
    function hex(x) { return x.map(rhex).join(''); }
    function md5(s) { return hex(md51(s)); }
    function add32(a, b) { return (a + b) & 0xffffffff; }

    function createSign(fields) {
      const sortedKeys = Object.keys(fields).sort();
      const joined = sortedKeys.map((key) => `${key}=${fields[key]}`).join('&');
      return md5(joined + KS_ENCRYPT_KEY);
    }

    function toFormBody(obj) {
      const form = new URLSearchParams();
      Object.entries(obj).forEach(([key, value]) => {
        form.append(key, String(value));
      });
      return form;
    }

    async function loadCoupons() {
      setResult('coupons.json 불러오는 중...');
      try {
        const res = await fetch(COUPONS_JSON_PATH + '?v=' + Date.now(), { cache: 'no-store' });
        if (!res.ok) {
          throw new Error('HTTP ' + res.status);
        }

        const data = await res.json();
        const coupons = Array.isArray(data.coupons) ? data.coupons : [];

        couponSelect.innerHTML = '';

        if (!coupons.length) {
          couponSelect.innerHTML = '<option value="">쿠폰 없음</option>';
          setResult('coupons.json 은 읽었지만 쿠폰 배열이 비어 있다.', 'bad');
          return;
        }

        const defaultOption = document.createElement('option');
        defaultOption.value = '';
        defaultOption.textContent = '쿠폰을 선택해라';
        couponSelect.appendChild(defaultOption);

        coupons.forEach((item) => {
          const code = String(item.code || '').trim();
          const until = String(item.until || '').trim();

          if (!code) return;

          const option = document.createElement('option');
          option.value = code;
          option.textContent = until ? `${code}  (${until})` : code;
          couponSelect.appendChild(option);
        });

        setResult(
          [
            '[coupons.json 로드 완료]',
            '',
            `불러온 쿠폰 수: ${coupons.length}`,
            '',
            '[쿠폰 목록]',
            ...coupons.map(item => `- ${item.code}${item.until ? ' / until ' + item.until : ''}`)
          ].join('\n'),
          'ok'
        );
      } catch (error) {
        setResult(
          [
            '[coupons.json 로드 실패]',
            '',
            'index.html 과 data/coupons.json 경로를 확인해라.',
            '로컬 file:// 로 열면 fetch가 막힐 수 있으니 로컬 서버로 여는 게 더 안전하다.',
            '',
            String(error)
          ].join('\n'),
          'bad'
        );
      }
    }

    couponSelect.addEventListener('change', function () {
      couponInput.value = couponSelect.value;
    });

    async function checkPlayer() {
      const fid = uidInput.value.trim();

      if (!fid) {
        setResult('UID를 먼저 입력해라.', 'bad');
        return;
      }

      const time = Math.floor(Date.now() / 1000);
      const payload = { fid, time };
      const sign = createSign(payload);
      const requestBody = { ...payload, sign };

      setResult('플레이어 확인 요청 중...');

      try {
        const res = await fetch(PLAYER_API, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
          },
          body: toFormBody(requestBody)
        });

        const text = await res.text();

        setResult(
          [
            '[플레이어 확인 완료]',
            '',
            `HTTP Status: ${res.status}`,
            '',
            '[보낸 값]',
            JSON.stringify(requestBody, null, 2),
            '',
            '[응답 원문]',
            text
          ].join('\n'),
          res.ok ? 'ok' : 'bad'
        );
      } catch (error) {
        setResult(
          [
            '[플레이어 확인 실패]',
            '',
            '브라우저 요청 자체가 막혔을 수 있다.',
            'CORS 에러면 프론트만으로는 안 되고 백엔드가 필요하다.',
            '',
            String(error)
          ].join('\n'),
          'bad'
        );
      }
    }

    async function redeemCoupon() {
      const fid = uidInput.value.trim();
      const cdk = couponInput.value.trim();

      if (!fid) {
        setResult('UID를 먼저 입력해라.', 'bad');
        return;
      }

      if (!cdk) {
        setResult('쿠폰 코드를 먼저 선택하거나 입력해라.', 'bad');
        return;
      }

      const time = Math.floor(Date.now() / 1000);
      const payload = { fid, cdk, time };
      const sign = createSign(payload);
      const requestBody = { ...payload, sign };

      setResult('쿠폰 등록 요청 중...');

      try {
        const res = await fetch(GIFT_API, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
          },
          body: toFormBody(requestBody)
        });

        const text = await res.text();

        setResult(
          [
            '[쿠폰 등록 요청 완료]',
            '',
            `HTTP Status: ${res.status}`,
            '',
            '[보낸 값]',
            JSON.stringify(requestBody, null, 2),
            '',
            '[응답 원문]',
            text
          ].join('\n'),
          res.ok ? 'ok' : 'bad'
        );
      } catch (error) {
        setResult(
          [
            '[쿠폰 등록 실패]',
            '',
            '브라우저 요청 자체가 막혔을 수 있다.',
            'CORS 에러면 프론트만으로는 안 되고 백엔드가 필요하다.',
            '',
            String(error)
          ].join('\n'),
          'bad'
        );
      }
    }

    reloadCouponsBtn.addEventListener('click', loadCoupons);
    checkPlayerBtn.addEventListener('click', checkPlayer);
    redeemBtn.addEventListener('click', redeemCoupon);
    clearBtn.addEventListener('click', () => {
      setResult('여기에 결과가 표시된다.');
    });

    loadCoupons();
  </script>
</body>
</html>
