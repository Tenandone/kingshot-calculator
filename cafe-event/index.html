<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>카페 이벤트 슬롯 추첨기</title>
  <style>
    :root{
      --bg1:#2a0f0f;
      --bg2:#140a0b;
      --bg3:#0d0909;
      --line:rgba(255,255,255,.08);
      --text:#fff8ef;
      --muted:#d9c7b8;
      --red1:#d64040;
      --red2:#981417;
      --black1:#2a2a2a;
      --black2:#080808;
      --green1:#4ab56f;
      --green2:#1b7a3d;
      --shadow:0 16px 40px rgba(0,0,0,.45);
      --radius:22px;
      --slot-width:520px;
      --row-height:88px;
      --frame-height:104px;
      --bottom-bar-h:148px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:Arial,"Malgun Gothic",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(255,186,120,.15), transparent 28%),
        radial-gradient(circle at 100% 0%, rgba(255,90,90,.12), transparent 24%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 45%, var(--bg3) 100%);
      min-height:100vh;
    }

    .app{
      width:min(980px, calc(100% - 20px));
      margin:0 auto;
      padding:14px 0 calc(var(--bottom-bar-h) + 24px);
    }

    .topbar{
      text-align:center;
      padding:10px 12px 6px;
    }

    .title{
      margin:0;
      font-size:28px;
      font-weight:900;
      letter-spacing:-.03em;
      color:#fff7df;
      text-shadow:0 2px 8px rgba(0,0,0,.35);
    }

    .panel{
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02)),
        linear-gradient(180deg, #251415, #181011);
      box-shadow:var(--shadow);
    }

    .slot-panel{
      padding:14px;
      overflow:hidden;
    }

    .machine-stage{
      position:relative;
      padding:18px 14px 24px;
      border-radius:20px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,219,149,.12), transparent 40%),
        radial-gradient(circle at 50% 100%, rgba(0,0,0,.35), transparent 50%),
        linear-gradient(180deg, #2b1415 0%, #1a1011 60%, #130d0e 100%);
      min-height:650px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    }

    .machine-wrap{
      width:min(100%, 620px);
      position:relative;
    }

    .machine-header{
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:14px;
      gap:12px;
      flex-direction:column;
    }

    .machine-logo{
      width:110px;
      height:110px;
      border-radius:50%;
      background:
        radial-gradient(circle at 40% 35%, rgba(255,255,255,.32), transparent 18%),
        linear-gradient(145deg, #ffefcd, #8e6f49 24%, #fff6df 37%, #8a673b 58%, #fff0cb 79%, #89673d 100%);
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,.28),
        inset 0 8px 18px rgba(255,255,255,.24),
        0 10px 16px rgba(0,0,0,.22);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:12px;
      overflow:hidden;
    }

    .machine-logo img{
      width:100%;
      height:100%;
      object-fit:cover;
      border-radius:50%;
      display:block;
    }

    .machine-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:10px 18px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
      color:#fff7df;
      font-weight:900;
      font-size:16px;
      letter-spacing:-.02em;
      text-align:center;
    }

    .slot-shell{
      position:relative;
      border-radius:36px;
      padding:22px;
      background:
        linear-gradient(145deg, #6b381d, #2d160e 34%, #7c4725 50%, #2c140e 68%, #5a311c 100%);
      box-shadow:
        inset 0 0 0 2px rgba(255,239,203,.18),
        inset 0 0 0 10px rgba(46,16,10,.68),
        0 18px 40px rgba(0,0,0,.5);
    }

    .slot-shell::before{
      content:"";
      position:absolute;
      inset:10px;
      border-radius:30px;
      background:
        linear-gradient(145deg, #f2e1bf, #8f6f4c 24%, #fff1d2 36%, #82633d 55%, #f4dfbc 72%, #7d5d36 100%);
      opacity:.22;
      pointer-events:none;
    }

    .slot-glass{
      position:relative;
      border-radius:28px;
      padding:20px 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02)),
        linear-gradient(180deg, #191113 0%, #110c0d 100%);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.06),
        inset 0 8px 20px rgba(255,255,255,.04),
        inset 0 -12px 24px rgba(0,0,0,.32);
    }

    .slot-window{
      position:relative;
      width:min(100%, var(--slot-width));
      height:calc(var(--row-height) * 3);
      margin:0 auto;
      overflow:hidden;
      border-radius:24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        linear-gradient(180deg, #1b1012 0%, #10090a 100%);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.05),
        inset 0 18px 30px rgba(255,255,255,.02),
        inset 0 -18px 30px rgba(0,0,0,.26);
    }

    .slot-window::before,
    .slot-window::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      height:calc(var(--row-height) * 0.95);
      z-index:3;
      pointer-events:none;
    }

    .slot-window::before{
      top:0;
      background:linear-gradient(180deg, rgba(11,7,8,.95), rgba(11,7,8,.1));
    }

    .slot-window::after{
      bottom:0;
      background:linear-gradient(180deg, rgba(11,7,8,0), rgba(11,7,8,.96));
    }

    .slot-track{
      position:absolute;
      left:0;
      top:0;
      width:100%;
      will-change:transform;
      transform:translateY(0);
      z-index:1;
    }

    .slot-row{
      height:var(--row-height);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 14px;
    }

    .slot-token{
      width:100%;
      height:66px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff9ef;
      font-weight:900;
      font-size:28px;
      letter-spacing:-.03em;
      border:1px solid rgba(255,255,255,.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.06),
        0 4px 10px rgba(0,0,0,.22);
      user-select:none;
      padding:0 18px;
    }

    .slot-token.red{ background:linear-gradient(180deg, var(--red1), var(--red2) 74%); }
    .slot-token.black{ background:linear-gradient(180deg, var(--black1), var(--black2) 74%); }
    .slot-token.green{ background:linear-gradient(180deg, var(--green1), var(--green2) 74%); }

    .slot-author{
      width:100%;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      text-align:center;
    }

    .slot-center-frame{
      position:absolute;
      left:50%;
      top:50%;
      width:calc(100% - 14px);
      height:var(--frame-height);
      transform:translate(-50%, -50%);
      border-radius:22px;
      z-index:4;
      pointer-events:none;
      box-shadow:
        0 0 0 2px rgba(255,236,196,.96),
        0 0 0 8px rgba(201,138,58,.14),
        0 10px 24px rgba(0,0,0,.28),
        0 0 24px rgba(255,214,120,.18);
      background:linear-gradient(180deg, rgba(255,244,213,.05), rgba(255,244,213,.015));
    }

    .slot-center-frame::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:22px;
      border:2px solid rgba(126,78,28,.68);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.2);
    }

    .slot-center-line{
      position:absolute;
      left:50%;
      top:10px;
      bottom:10px;
      width:4px;
      transform:translateX(-50%);
      border-radius:999px;
      background:linear-gradient(180deg, #fff6dd, #f1c671 52%, #fff6dd);
      box-shadow:0 0 12px rgba(255,220,140,.45);
      opacity:.95;
    }

    .slot-center-frame.glow{
      box-shadow:
        0 0 0 2px rgba(255,236,196,.98),
        0 0 0 8px rgba(201,138,58,.16),
        0 10px 24px rgba(0,0,0,.28),
        0 0 40px rgba(255,214,120,.38);
    }

    .live-box{
      width:min(100%, 620px);
      margin:16px auto 0;
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      padding:16px 14px;
      text-align:center;
    }

    .box-title{
      margin:0 0 10px;
      font-size:17px;
      font-weight:900;
    }

    .live-name{
      font-size:34px;
      font-weight:900;
      line-height:1.1;
      color:#fff7df;
      text-shadow:0 1px 2px rgba(0,0,0,.5);
      min-height:44px;
      display:flex;
      align-items:center;
      justify-content:center;
      word-break:break-word;
    }

    .live-sub{
      margin-top:8px;
      font-size:14px;
      color:var(--muted);
      line-height:1.6;
      min-height:24px;
    }

    .section{
      margin-top:12px;
      padding:16px;
    }

    .section h2{
      margin:0 0 10px;
      font-size:19px;
    }

    textarea{
      width:100%;
      min-height:220px;
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:14px;
      resize:vertical;
      background:#120d0e;
      color:var(--text);
      font-size:13px;
      line-height:1.65;
      outline:none;
    }

    .status{
      margin-top:10px;
      font-size:12px;
      color:#f4d7b1;
      line-height:1.55;
      white-space:pre-line;
    }

    .ticket-summary{
      display:grid;
      gap:10px;
      margin-top:12px;
    }

    .ticket-item{
      display:flex;
      gap:12px;
      align-items:flex-start;
      padding:12px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.02));
    }

    .ticket-rank{
      width:34px;
      height:34px;
      flex:0 0 34px;
      border-radius:50%;
      display:grid;
      place-items:center;
      font-size:13px;
      font-weight:900;
      color:#2a140a;
      background:linear-gradient(180deg, #ffe3b2, #b07a36);
      box-shadow:inset 0 1px 2px rgba(255,255,255,.35);
    }

    .ticket-text{
      min-width:0;
      flex:1;
    }

    .ticket-title{
      font-size:15px;
      font-weight:900;
      line-height:1.45;
      margin-bottom:4px;
      word-break:break-word;
    }

    .ticket-meta{
      font-size:13px;
      color:var(--muted);
      line-height:1.6;
      word-break:break-word;
    }

    .result-list{
      display:grid;
      gap:10px;
      margin-top:12px;
    }

    .result-item{
      display:flex;
      gap:12px;
      align-items:flex-start;
      padding:12px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.02));
    }

    .result-rank{
      width:34px;
      height:34px;
      flex:0 0 34px;
      border-radius:50%;
      display:grid;
      place-items:center;
      font-size:13px;
      font-weight:900;
      color:#2a140a;
      background:linear-gradient(180deg, #ffe3b2, #b07a36);
      box-shadow:inset 0 1px 2px rgba(255,255,255,.35);
    }

    .result-text{
      min-width:0;
      flex:1;
    }

    .result-title{
      font-size:15px;
      font-weight:900;
      line-height:1.45;
      margin-bottom:4px;
      word-break:break-word;
    }

    .result-meta{
      font-size:13px;
      color:var(--muted);
      line-height:1.6;
      word-break:break-word;
    }

    .bottom-bar{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      z-index:60;
      padding:12px 12px calc(12px + env(safe-area-inset-bottom));
      background:
        linear-gradient(180deg, rgba(12,8,9,.2), rgba(12,8,9,.92) 24%, rgba(12,8,9,.98) 100%);
      backdrop-filter:blur(8px);
      border-top:1px solid rgba(255,255,255,.08);
    }

    .bottom-inner{
      width:min(980px, calc(100% - 4px));
      margin:0 auto;
      display:grid;
      gap:10px;
    }

    .count-row,
    .action-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .count-btn,.action-btn{
      appearance:none;
      border:1px solid rgba(255,255,255,.1);
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.01));
      color:var(--text);
      border-radius:16px;
      padding:14px 12px;
      font-weight:800;
      font-size:14px;
      cursor:pointer;
      transition:.2s ease;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
    }

    .count-btn.active{
      border-color:rgba(216,176,107,.55);
      background:
        radial-gradient(circle at 50% 0%, rgba(255,215,120,.22), transparent 56%),
        linear-gradient(180deg, rgba(216,176,107,.18), rgba(216,176,107,.05));
      color:#fff7df;
    }

    .count-btn .big{
      display:block;
      font-size:18px;
      margin-bottom:4px;
      font-weight:900;
    }

    .count-btn .small{
      display:block;
      font-size:11px;
      color:var(--muted);
      line-height:1.45;
    }

    .action-btn.primary{
      background:
        radial-gradient(circle at 50% 0%, rgba(255,214,132,.28), transparent 55%),
        linear-gradient(180deg, #6a3a12, #3e2411 55%, #28170e 100%);
      border-color:rgba(255,209,122,.4);
    }

    .action-btn.secondary{
      background:linear-gradient(180deg, #4e1d1f, #311416);
    }

    .action-btn.ghost{
      background:linear-gradient(180deg, #2a2526, #171213);
    }

    .action-btn:disabled,
    .count-btn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    .popup{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      z-index:100;
      background:rgba(0,0,0,.66);
      backdrop-filter:blur(6px);
    }

    .popup.show{display:flex}

    .popup-card{
      width:min(100%, 620px);
      border-radius:24px;
      border:1px solid rgba(255,255,255,.12);
      background:
        radial-gradient(circle at 50% 0%, rgba(255,214,132,.18), transparent 40%),
        linear-gradient(180deg, #2a1516 0%, #160e0f 100%);
      box-shadow:0 20px 60px rgba(0,0,0,.55);
      padding:20px 18px 18px;
    }

    .popup-title{
      margin:0 0 8px;
      text-align:center;
      font-size:24px;
      font-weight:900;
      color:#fff7df;
    }

    .popup-sub{
      text-align:center;
      color:#f4d7b1;
      font-size:14px;
      line-height:1.7;
      margin-bottom:14px;
    }

    .gift-card-box{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
      margin-bottom:14px;
    }

    .gift-card-image{
      width:min(100%, 260px);
      display:block;
      border-radius:20px;
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,.12),
        0 12px 28px rgba(0,0,0,.28);
    }

    .winner-message{
      text-align:center;
      font-size:22px;
      font-weight:900;
      color:#fff7df;
      line-height:1.45;
      margin-bottom:14px;
      word-break:keep-all;
    }

    .popup-list{
      display:grid;
      gap:10px;
      margin-bottom:16px;
      max-height:360px;
      overflow:auto;
    }

    .popup-item{
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      padding:12px;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
    }

    .popup-item strong{
      display:block;
      font-size:15px;
      line-height:1.45;
      margin-bottom:4px;
      word-break:break-word;
    }

    .popup-item span{
      display:block;
      font-size:13px;
      color:var(--muted);
      line-height:1.6;
      word-break:break-word;
    }

    .popup-bottom-text{
      text-align:center;
      color:#f4d7b1;
      font-size:14px;
      line-height:1.7;
      margin:2px 0 14px;
      word-break:keep-all;
    }

    .popup-close{
      width:100%;
      border:0;
      border-radius:16px;
      padding:14px 12px;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
      color:#2a140a;
      background:linear-gradient(180deg, #ffe3b2, #b07a36);
    }

    @media (max-width: 720px){
      :root{
        --slot-width:min(100%, 360px);
        --row-height:72px;
        --frame-height:88px;
        --bottom-bar-h:158px;
      }

      .title{
        font-size:22px;
      }

      .machine-stage{
        min-height:540px;
        padding-top:16px;
      }

      .machine-logo{
        width:88px;
        height:88px;
      }

      .slot-token{
        height:56px;
        font-size:22px;
      }

      .live-name{
        font-size:26px;
        min-height:34px;
      }

      .count-btn .big{
        font-size:16px;
      }

      .winner-message{
        font-size:18px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <h1 class="title">카페 이벤트 슬롯 추첨기</h1>
    </div>

    <div class="panel slot-panel main-stage">
      <div class="machine-stage">
        <div class="machine-wrap">
          <div class="machine-header">
            <div class="machine-logo">
              <img src="/img/kingshotdata-logo.png" alt="KingshotData 로고" onerror="this.style.display='none'">
            </div>
            <div class="machine-badge" id="machineBadge">5명 추첨</div>
          </div>

          <div class="slot-shell">
            <div class="slot-glass">
              <div class="slot-window" id="slotWindow">
                <div class="slot-track" id="slotTrack"></div>
                <div class="slot-center-frame" id="slotFrame">
                  <div class="slot-center-line"></div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="live-box">
          <h3 class="box-title">현재 선택</h3>
          <div class="live-name" id="liveName">대기 중</div>
          <div class="live-sub" id="liveSub"></div>
        </div>
      </div>
    </div>

    <div class="panel section">
      <h2>오늘하루 게시판 추첨인원</h2>
      <textarea id="rawInput" placeholder="여기에 오늘하루 게시판 데이터를 붙여넣어"></textarea>
      <div class="status" id="statusText">대기 중</div>
    </div>

    <div class="panel section">
      <h2>작성자별 추첨권 현황</h2>
      <div class="ticket-summary" id="ticketSummary"></div>
    </div>

    <div class="panel section" style="margin-top:12px;">
      <h2>최종 당첨 결과</h2>
      <div class="result-list" id="resultList"></div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="bottom-inner">
      <div class="count-row">
        <button class="count-btn active" id="count5Btn" type="button">
          <span class="big">5명 추첨</span>
          <span class="small">작성자 중복 없이</span>
        </button>
        <button class="count-btn" id="count10Btn" type="button">
          <span class="big">10명 추첨</span>
          <span class="small">작성자 중복 없이</span>
        </button>
      </div>

      <div class="action-row">
        <button class="action-btn primary" id="parseBtn" type="button">데이터 분석</button>
        <button class="action-btn secondary" id="spinBtn" type="button" disabled>슬롯 시작</button>
      </div>

      <div class="action-row">
        <button class="action-btn ghost" id="autoBtn" type="button" disabled>자동 진행</button>
        <button class="action-btn ghost" id="resetBtn" type="button">초기화</button>
      </div>
    </div>
  </div>

  <div class="popup" id="popup">
    <div class="popup-card">
      <h2 class="popup-title" id="popupTitle">당첨 안내</h2>

      <div class="gift-card-box">
        <img
          class="gift-card-image"
          src="/img/giftcode.png"
          alt="구글 기프트카드 1만원"
          onerror="this.style.display='none'"
        />
      </div>

      <div class="winner-message" id="winnerMessage">당첨을 축하합니다.</div>

      <div class="popup-sub" id="popupSub">구글 기프트카드 1만원</div>

      <div class="popup-list" id="popupList"></div>

      <div class="popup-bottom-text" id="popupBottomText">
        킹샷카페 오늘하루 게시판 이벤트 많은 관심 부탁드립니다.
      </div>

      <button class="popup-close" id="popupClose" type="button">확인</button>
    </div>
  </div>

  <script>
    const EXCLUDED_AUTHORS = new Set(['Ten']);

    const state = {
      extraMode: '5',
      posts: [],
      authorTickets: [],
      results: [],
      spinning: false,
      currentTrackItems: [],
      currentRenderedItems: [],
      currentOffset: 0,
      popupLocked: false
    };

    const els = {
      count5Btn: document.getElementById('count5Btn'),
      count10Btn: document.getElementById('count10Btn'),
      parseBtn: document.getElementById('parseBtn'),
      spinBtn: document.getElementById('spinBtn'),
      autoBtn: document.getElementById('autoBtn'),
      resetBtn: document.getElementById('resetBtn'),
      rawInput: document.getElementById('rawInput'),
      statusText: document.getElementById('statusText'),
      slotWindow: document.getElementById('slotWindow'),
      slotTrack: document.getElementById('slotTrack'),
      slotFrame: document.getElementById('slotFrame'),
      liveName: document.getElementById('liveName'),
      liveSub: document.getElementById('liveSub'),
      resultList: document.getElementById('resultList'),
      ticketSummary: document.getElementById('ticketSummary'),
      popup: document.getElementById('popup'),
      popupTitle: document.getElementById('popupTitle'),
      popupSub: document.getElementById('popupSub'),
      popupList: document.getElementById('popupList'),
      popupClose: document.getElementById('popupClose'),
      popupBottomText: document.getElementById('popupBottomText'),
      winnerMessage: document.getElementById('winnerMessage'),
      machineBadge: document.getElementById('machineBadge')
    };

    function escapeHtml(str){
      return String(str ?? '')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#39;");
    }

    function sleep(ms){
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function formatNo(no){
      return String(no).padStart(2, '0');
    }

    function cleanTitle(raw){
      return String(raw || '').replace(/댓글수\[\d+\]/g, '').trim();
    }

    function easeOutCubic(t){
      return 1 - Math.pow(1 - t, 3);
    }

    function getRowHeight(){
      const v = getComputedStyle(document.documentElement).getPropertyValue('--row-height').trim();
      return parseFloat(v) || 88;
    }

    function getCenterIndexForWindow(){
      return 1;
    }

    function parsePosts(raw){
      const normalized = String(raw || '').replace(/\r/g, '');
      const blocks = normalized.split(/\n\s*\n+/).map(v => v.trim()).filter(Boolean);
      const posts = [];

      for(const block of blocks){
        const lines = block.split('\n').map(v => v.trim()).filter(Boolean);
        if(lines.length < 4) continue;

        const idLine = lines[0];
        const titleLine = lines[1];
        const authorLine = lines[2];
        const metaLine = lines[3];

        const idMatch = idLine.match(/^(\d+)$/);
        const commentMatch = titleLine.match(/댓글수\[(\d+)\]/);
        const metaMatch = metaLine.match(/^(\d{4}\.\d{2}\.\d{2}\.)\s+(\d+)\s+(\d+)$/);

        if(!idMatch || !commentMatch || !metaMatch) continue;

        posts.push({
          id: Number(idMatch[1]),
          title: cleanTitle(titleLine),
          author: authorLine,
          date: metaMatch[1],
          views: Number(metaMatch[2]),
          likes: Number(metaMatch[3]),
          comments: Number(commentMatch[1])
        });
      }

      return posts;
    }

    function assignFixedNumbers(posts){
      return posts.map((post, idx) => ({
        ...post,
        fixedNo: idx + 1
      }));
    }

    function buildAuthorTickets(posts){
      const authorMap = new Map();

      for(const post of posts){
        if(EXCLUDED_AUTHORS.has(post.author)) continue;

        if(!authorMap.has(post.author)){
          authorMap.set(post.author, {
            author: post.author,
            ticketCount: 0,
            representative: post,
            posts: []
          });
        }

        const entry = authorMap.get(post.author);
        entry.ticketCount += 1;
        entry.posts.push(post);
      }

      return [...authorMap.values()].sort((a, b) => {
        if(b.ticketCount !== a.ticketCount) return b.ticketCount - a.ticketCount;
        return a.author.localeCompare(b.author, 'ko');
      });
    }

    function getCurrentWinnerAuthors(){
      return new Set(state.results.map(v => v.author));
    }

    function buildAvailableTickets(){
      const winnerAuthors = getCurrentWinnerAuthors();
      const tickets = [];

      for(const entry of state.authorTickets){
        if(winnerAuthors.has(entry.author)) continue;

        for(let i = 0; i < entry.ticketCount; i++){
          tickets.push({
            author: entry.author,
            representative: entry.representative,
            ticketNo: i + 1,
            totalTickets: entry.ticketCount
          });
        }
      }

      return tickets;
    }

    function getRemainingAuthorEntries(){
      const winnerAuthors = getCurrentWinnerAuthors();
      return state.authorTickets.filter(entry => !winnerAuthors.has(entry.author));
    }

    function getCountTarget(){
      return state.extraMode === '5' ? 5 : 10;
    }

    function getTokenType(idx){
      return idx === 0 ? 'green' : (idx % 2 ? 'red' : 'black');
    }

    function buildTrackItems(sourceTickets){
      if(!sourceTickets.length){
        return [{
          author: '',
          label: '대기 중',
          representative: null,
          ticketNo: 0,
          totalTickets: 0,
          type: 'green'
        }];
      }

      return sourceTickets.map((ticket, idx) => ({
        ...ticket,
        label: ticket.author,
        type: getTokenType(idx)
      }));
    }

    function renderTrack(items){
      state.currentTrackItems = items;

      const repeated = [];
      const repeatCount = items.length === 1 ? 7 : 18;

      for(let r = 0; r < repeatCount; r++){
        for(let i = 0; i < items.length; i++){
          repeated.push({
            ...items[i],
            renderKey: `${r}-${i}`
          });
        }
      }

      state.currentRenderedItems = repeated;

      els.slotTrack.innerHTML = repeated.map((item, renderIndex) => `
        <div class="slot-row" data-render-index="${renderIndex}" data-author="${escapeHtml(item.author)}">
          <div class="slot-token ${item.type}">
            <span class="slot-author">${escapeHtml(item.label)}</span>
          </div>
        </div>
      `).join('');
    }

    function setTrackOffset(offset){
      state.currentOffset = offset;
      els.slotTrack.style.transform = `translateY(${offset}px)`;
    }

    function getTrackCenterOffsetForAbsoluteIndex(index){
      const rowH = getRowHeight();
      const centerIndex = getCenterIndexForWindow();
      return -((index - centerIndex) * rowH);
    }

    function renderTrackPreview(){
      const tickets = buildAvailableTickets();
      renderTrack(buildTrackItems(tickets));
      setTrackOffset(0);
    }

    function renderTicketSummary(){
      const entries = getRemainingAuthorEntries();

      if(!state.authorTickets.length){
        els.ticketSummary.innerHTML = `
          <div class="ticket-item">
            <div class="ticket-rank">-</div>
            <div class="ticket-text">
              <div class="ticket-title">표시할 인원이 없어</div>
              <div class="ticket-meta"></div>
            </div>
          </div>
        `;
        return;
      }

      if(!entries.length){
        els.ticketSummary.innerHTML = `
          <div class="ticket-item">
            <div class="ticket-rank">-</div>
            <div class="ticket-text">
              <div class="ticket-title">남은 추첨 인원이 없어</div>
              <div class="ticket-meta"></div>
            </div>
          </div>
        `;
        return;
      }

      els.ticketSummary.innerHTML = entries.map((entry, idx) => `
        <div class="ticket-item">
          <div class="ticket-rank">${idx + 1}</div>
          <div class="ticket-text">
            <div class="ticket-title">${escapeHtml(entry.author)} 추첨권 ${entry.ticketCount}장</div>
            <div class="ticket-meta">게시글 ${entry.ticketCount}개 작성</div>
          </div>
        </div>
      `).join('');
    }

    function renderResults(){
      if(!state.results.length){
        els.resultList.innerHTML = `
          <div class="result-item">
            <div class="result-rank">-</div>
            <div class="result-text">
              <div class="result-title">아직 당첨 결과가 없어</div>
              <div class="result-meta">${getCountTarget()}명 추첨 결과가 여기에 표시돼</div>
            </div>
          </div>
        `;
        return;
      }

      els.resultList.innerHTML = state.results.map((entry, idx) => `
        <div class="result-item">
          <div class="result-rank">${idx + 1}</div>
          <div class="result-text">
            <div class="result-title">${escapeHtml(entry.author)}님 1만원 당첨을 축하합니다.</div>
            <div class="result-meta">추첨권 ${entry.totalTickets}장</div>
          </div>
        </div>
      `).join('');
    }

    function updateButtons(){
      const hasPosts = state.posts.length > 0;
      const targetCount = getCountTarget();
      const currentPool = buildAvailableTickets();
      const remainingAuthors = getRemainingAuthorEntries().length;
      const canSpin = hasPosts && !state.spinning && state.results.length < targetCount && currentPool.length > 0 && remainingAuthors > 0;

      els.spinBtn.disabled = !canSpin;
      els.autoBtn.disabled = !canSpin;
    }

    function updateMachineBadge(){
      const target = getCountTarget();
      const remain = Math.max(0, target - state.results.length);
      els.machineBadge.textContent = `${target}명 추첨 | 남은 인원 ${remain}명`;
    }

    function setLiveEntry(entry, prefix = ''){
      if(!entry){
        els.liveName.textContent = '대기 중';
        els.liveSub.textContent = '';
        return;
      }

      els.liveName.textContent = prefix ? `${prefix} ${entry.author}` : entry.author;
      els.liveSub.textContent = `추첨권 ${entry.totalTickets}장`;
    }

    function closePopup(force = false){
      if(state.popupLocked && !force) return;
      els.popup.classList.remove('show');
    }

    async function showWinnerPopup(entry, autoClose = true){
      els.popupTitle.textContent = `${state.results.length}번째 당첨`;
      els.winnerMessage.textContent = `${entry.author}님 당첨을 축하합니다.`;
      els.popupSub.textContent = `구글 기프트카드 1만원`;
      els.popupBottomText.textContent = `킹샷카페 오늘하루 게시판 이벤트 많은 관심 부탁드립니다.`;

      els.popupList.innerHTML = `
        <div class="popup-item">
          <strong>${escapeHtml(entry.author)}님 1만원 당첨</strong>
          <span>추첨권 ${entry.totalTickets}장</span>
        </div>
      `;

      els.popup.classList.add('show');

      if(!autoClose) return;

      state.popupLocked = true;
      await sleep(1500);
      state.popupLocked = false;
      closePopup(true);
      await sleep(180);
    }

    function showFinalPopup(){
      els.popupTitle.textContent = `최종 당첨자 ${state.results.length}명`;
      els.winnerMessage.textContent = `최종 당첨자 전원 1만원 당첨을 축하합니다.`;
      els.popupSub.textContent = `구글 기프트카드 1만원`;
      els.popupBottomText.textContent = `킹샷카페 오늘하루 게시판 이벤트 많은 관심 부탁드립니다.`;

      els.popupList.innerHTML = state.results.map((entry, idx) => `
        <div class="popup-item">
          <strong>${formatNo(idx + 1)}. ${escapeHtml(entry.author)}님</strong>
          <span>구글 기프트카드 1만원 당첨 | 추첨권 ${entry.totalTickets}장</span>
        </div>
      `).join('');

      els.popup.classList.add('show');
    }

    async function animateTrack(fromOffset, toOffset, duration, easingFn){
      return new Promise(resolve => {
        const startTs = performance.now();

        function frame(now){
          const elapsed = now - startTs;
          const t = Math.min(1, elapsed / duration);
          const eased = easingFn(t);
          const current = fromOffset + (toOffset - fromOffset) * eased;
          setTrackOffset(current);

          if(t < 1){
            requestAnimationFrame(frame);
          } else {
            resolve();
          }
        }

        requestAnimationFrame(frame);
      });
    }

    function getCenteredRenderedItem(){
      const rows = els.slotTrack.querySelectorAll('.slot-row');
      if(!rows.length) return null;

      const frameRect = els.slotFrame.getBoundingClientRect();
      const frameCenterY = frameRect.top + (frameRect.height / 2);

      let closestRow = null;
      let closestDistance = Infinity;

      rows.forEach(row => {
        const rect = row.getBoundingClientRect();
        const rowCenterY = rect.top + (rect.height / 2);
        const distance = Math.abs(rowCenterY - frameCenterY);

        if(distance < closestDistance){
          closestDistance = distance;
          closestRow = row;
        }
      });

      if(!closestRow) return null;

      const renderIndex = Number(closestRow.dataset.renderIndex);
      if(Number.isNaN(renderIndex)) return null;

      return state.currentRenderedItems[renderIndex] || null;
    }

    async function animateSlotAndGetWinner(){
      const items = state.currentTrackItems;
      const total = items.length;

      if(!total){
        return null;
      }

      if(total === 1){
        const centerAbsoluteIndex = 1;
        const centerOffset = getTrackCenterOffsetForAbsoluteIndex(centerAbsoluteIndex);
        setTrackOffset(centerOffset);

        const winnerEntry = items[0] || null;
        if(winnerEntry) setLiveEntry(winnerEntry, '당첨');
        return winnerEntry;
      }

      const rowH = getRowHeight();
      const start = 0;
      const baseLoops = 10 + Math.floor(Math.random() * 3);
      const winnerIndex = Math.floor(Math.random() * total);

      const absoluteIndexForWinner = baseLoops * total + winnerIndex + getCenterIndexForWindow();
      const finalTarget = getTrackCenterOffsetForAbsoluteIndex(absoluteIndexForWinner);
      const overshoot = rowH * (0.22 + Math.random() * 0.12);

      const phase1 = finalTarget - overshoot;
      const phase2 = finalTarget + (overshoot * 0.35);

      els.slotFrame.classList.add('glow');

      await animateTrack(start, phase1, 3900, easeOutCubic);
      await animateTrack(phase1, phase2, 240, easeOutCubic);
      await animateTrack(phase2, finalTarget, 180, easeOutCubic);

      els.slotFrame.classList.remove('glow');

      const snappedFinalTarget = Math.round(finalTarget / rowH) * rowH;
      setTrackOffset(snappedFinalTarget);

      await sleep(30);

      const centeredItem = getCenteredRenderedItem();
      const winnerEntry = centeredItem || items[winnerIndex] || null;

      if(winnerEntry){
        setLiveEntry(winnerEntry, '당첨');
      }

      return winnerEntry;
    }

    function analyzeData(){
      const parsed = parsePosts(els.rawInput.value);
      const posts = assignFixedNumbers(parsed);

      state.posts = posts;
      state.authorTickets = buildAuthorTickets(posts);
      state.results = [];
      state.spinning = false;
      state.currentOffset = 0;
      state.popupLocked = false;

      if(!posts.length){
        els.statusText.textContent = '파싱 실패';
        renderTrack(buildTrackItems([]));
        renderTicketSummary();
        renderResults();
        setLiveEntry(null);
        updateMachineBadge();
        updateButtons();
        return;
      }

      renderTrackPreview();
      renderTicketSummary();
      renderResults();
      setLiveEntry(null);

      const totalAuthors = state.authorTickets.length;
      const totalTickets = state.authorTickets.reduce((sum, entry) => sum + entry.ticketCount, 0);
      const summaryText = state.authorTickets
        .map(entry => `${entry.author} 추첨권 ${entry.ticketCount}장`)
        .join(' | ');

      els.statusText.textContent =
        `전체 게시글 ${state.posts.length}개 | 전체 작성자 ${totalAuthors}명 | 전체 추첨권 ${totalTickets}장\n${summaryText}`;

      updateMachineBadge();
      updateButtons();
    }

    async function spinAllModeOnce(){
      const pool = buildAvailableTickets();
      const targetCount = getCountTarget();

      if(!pool.length) return;
      if(state.results.length >= targetCount) return;

      state.spinning = true;
      updateButtons();

      renderTrack(buildTrackItems(pool));
      setTrackOffset(0);

      const winnerEntry = await animateSlotAndGetWinner();

      if(!winnerEntry){
        state.spinning = false;
        updateButtons();
        return;
      }

      const finalWinner = {
        author: winnerEntry.author,
        totalTickets: winnerEntry.totalTickets
      };

      if(!state.results.some(v => v.author === finalWinner.author)){
        state.results.push(finalWinner);
      }

      renderResults();
      renderTicketSummary();
      updateMachineBadge();
      await showWinnerPopup(finalWinner, true);

      state.currentOffset = 0;
      renderTrackPreview();

      const remain = targetCount - state.results.length;
      const leftPool = buildAvailableTickets().length;
      els.statusText.textContent = `남은 인원 ${remain}명 | 남은 추첨권 ${leftPool}장`;

      state.spinning = false;
      updateButtons();

      if(state.results.length >= targetCount || getRemainingAuthorEntries().length === 0){
        showFinalPopup();
      }
    }

    async function spinMain(){
      if(state.spinning) return;
      if(!state.posts.length) return;

      closePopup(true);
      await spinAllModeOnce();
    }

    async function autoRun(){
      if(state.spinning || !state.posts.length) return;

      closePopup(true);

      while(!state.spinning && state.results.length < getCountTarget() && getRemainingAuthorEntries().length > 0){
        await spinAllModeOnce();

        if(state.results.length < getCountTarget()){
          closePopup(true);
          await sleep(420);
        }
      }
    }

    function resetAll(){
      state.posts = [];
      state.authorTickets = [];
      state.results = [];
      state.spinning = false;
      state.currentTrackItems = [];
      state.currentRenderedItems = [];
      state.currentOffset = 0;
      state.popupLocked = false;

      els.rawInput.value = '';
      els.statusText.textContent = '초기화 완료';
      closePopup(true);

      renderTrack(buildTrackItems([]));
      renderTicketSummary();
      renderResults();
      setLiveEntry(null);
      updateMachineBadge();
      updateButtons();
    }

    function setExtraMode(value){
      state.extraMode = value;
      els.count5Btn.classList.toggle('active', value === '5');
      els.count10Btn.classList.toggle('active', value === '10');

      state.results = [];
      state.currentOffset = 0;
      closePopup(true);

      renderTrackPreview();
      renderTicketSummary();
      renderResults();
      setLiveEntry(null);
      updateMachineBadge();
      updateButtons();
    }

    els.count5Btn.addEventListener('click', () => setExtraMode('5'));
    els.count10Btn.addEventListener('click', () => setExtraMode('10'));
    els.parseBtn.addEventListener('click', analyzeData);
    els.spinBtn.addEventListener('click', spinMain);
    els.autoBtn.addEventListener('click', autoRun);
    els.resetBtn.addEventListener('click', resetAll);
    els.popupClose.addEventListener('click', () => closePopup());
    els.popup.addEventListener('click', (e) => {
      if(e.target === els.popup) closePopup();
    });

    renderTrack(buildTrackItems([]));
    renderTicketSummary();
    renderResults();
    setLiveEntry(null);
    updateMachineBadge();
    updateButtons();
  </script>
</body>
</html>
