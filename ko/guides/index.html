  <style>
  *{ box-sizing:border-box; }

  :root{
    --brand:#0b57d0;
    --text:#111827;
    --muted:#6b7280;

    --bg:#ffffff;
    --surface:#ffffff;

    --tile-border:#5b5e73;

    --border:#e5e7eb;
    --chip:#f3f4f6;

    --shadow:0 10px 25px rgba(0,0,0,.06);
  }

  @media (prefers-color-scheme: dark){
    :root{
      --brand:#0b57d0;
      --text:#111827;
      --muted:#6b7280;

      --bg:#ffffff;
      --surface:#ffffff;

      --tile-border:#5b5e73;

      --border:#e5e7eb;
      --chip:#f3f4f6;

      --shadow:0 10px 25px rgba(0,0,0,.06);
    }
  }

  html,body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font:15px/1.65 system-ui,-apple-system,"Segoe UI",Roboto,Pretendard,"Noto Sans KR",Arial,sans-serif;
  }

  a{ color:inherit; text-decoration:none; }
  .muted{ color:var(--muted); }

  .guides-head{
    max-width:1100px;
    margin:0 auto;
    padding:22px 16px 10px;
  }
  #page-title{
    margin:0 0 12px;
    font-size:clamp(24px,3vw,34px);
    letter-spacing:-0.02em;
  }

  .guides-tools{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
    margin-bottom:10px;
  }
  #guide-search{
    flex:1 1 240px;
    height:42px;
    padding:10px 12px;
    border:1px solid var(--border);
    border-radius:12px;
    background:var(--surface);
    color:var(--text);
    outline:none;
  }
  #guide-search:focus{
    border-color:color-mix(in srgb, var(--brand) 55%, var(--border));
    box-shadow:0 0 0 4px color-mix(in srgb, var(--brand) 18%, transparent);
  }
  #guide-count{
    font-size:14px;
    white-space:nowrap;
  }

  .reco-wrap{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    padding:6px 0 12px;
  }
  .reco-title{
    font-size:13px;
    font-weight:800;
    color:var(--muted);
    letter-spacing:-0.01em;
    display:flex;
    gap:8px;
    align-items:center;
  }
  #guide-reco{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }

  .chip{
    display:inline-flex;
    align-items:center;
    height:34px;
    padding:0 12px;
    border-radius:999px;
    border:1px solid var(--border);
    background:var(--chip);
    color:var(--text);
    font-weight:700;
    font-size:13px;
    cursor:pointer;
    user-select:none;
    transition:border-color .15s ease, transform .15s ease;
  }
  .chip:hover{
    border-color:color-mix(in srgb, var(--brand) 40%, var(--border));
    transform:translateY(-1px);
  }

  #guide-toc{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    padding:0 0 6px;
  }

  .sep{
    border:0;
    border-top:1px solid var(--border);
    margin:0;
  }

  .guides-wrap{
    max-width:1100px;
    margin:0 auto;
    padding:16px;
  }

  .guides-list{
    display:grid;
    grid-template-columns:repeat(3, minmax(0, 1fr));
    gap:18px;
    padding:10px 0 24px;
  }
  @media (max-width: 980px){
    .guides-list{ grid-template-columns:repeat(2, minmax(0, 1fr)); }
  }
  @media (max-width: 640px){
    .guides-list{ grid-template-columns:1fr; }
  }

  .g-block{
    background:var(--surface);
    border:2px solid var(--tile-border);
    border-radius:26px;
    overflow:hidden;
    transition:transform .18s ease, box-shadow .18s ease;
  }
  .g-block:hover{
    transform:translateY(-2px);
    box-shadow:var(--shadow);
  }

  .g-link{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    gap:12px;
    padding:24px;
    min-height:190px;
  }

  .tile-icon{
    flex:0 0 auto;
    width:100%;
    height:160px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }

  .tile-icon img{
    max-width:140px;
    max-height:140px;
    width:auto;
    height:auto;
    display:block;
    object-fit:contain;
    filter:drop-shadow(0 8px 12px rgba(0,0,0,.18));
  }

  .tile-fallback{
    display:none;
    width:140px;
    height:140px;
    border-radius:22px;
    border:1px solid var(--border);
    background:color-mix(in srgb, var(--surface) 90%, var(--brand) 6%);
    color:var(--brand);
    font-weight:900;
    font-size:34px;
    align-items:center;
    justify-content:center;
    user-select:none;
  }

  .tile-icon.is-fallback img{ display:none; }
  .tile-icon.is-fallback .tile-fallback{ display:flex; }

  .tile-title{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    min-width:0;
    padding:0 8px;
  }

  .g-title{

    letter-spacing:-0.02em;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  </style>

  <script>
  (function () {
    'use strict';

    function getTitle(card) {
      return card.getAttribute('data-title') || '';
    }

    function buildToc() {
      var toc = document.getElementById('guide-toc');
      if (!toc) return;

      var cards = document.querySelectorAll('.g-block[data-toc="true"]');
      var html = '';

      for (var i = 0; i < cards.length; i++) {
        var card = cards[i];
        var title = getTitle(card);
        var link = card.querySelector('a.g-link');
        var href = link ? link.getAttribute('href') : '#';
        html += '<a class="chip" data-router-ignore="true" href="' + href + '">' + title + '</a>';
      }

      toc.innerHTML = html;
    }

    function buildReco() {
      var recoWrap = document.getElementById('guide-reco');
      var recoEmpty = document.getElementById('guide-reco-empty');
      if (!recoWrap || !recoEmpty) return;

      var raw = null;
      try {
        raw = JSON.parse(localStorage.getItem('ks-guide-clicks') || '{}');
      } catch (_) {
        raw = {};
      }

      var arr = [];
      for (var key in raw) {
        if (Object.prototype.hasOwnProperty.call(raw, key)) {
          arr.push({ id: key, count: Number(raw[key] || 0) });
        }
      }

      arr.sort(function (a, b) { return b.count - a.count; });
      arr = arr.slice(0, 5);

      if (!arr.length) {
        recoWrap.innerHTML = '';
        recoEmpty.style.display = '';
        return;
      }

      recoEmpty.style.display = 'none';

      var html = '';
      for (var i = 0; i < arr.length; i++) {
        var card = document.querySelector('.g-block[data-guide="' + arr[i].id + '"]');
        if (!card) continue;

        var title = getTitle(card);
        var link = card.querySelector('a.g-link');
        var href = link ? link.getAttribute('href') : '#';
        html += '<a class="chip" data-router-ignore="true" href="' + href + '">' + title + '</a>';
      }
      recoWrap.innerHTML = html;
    }

    function bindClicks() {
      var cards = document.querySelectorAll('.g-block[data-guide]');
      for (var i = 0; i < cards.length; i++) {
        (function (card) {
          var guideId = card.getAttribute('data-guide');
          var link = card.querySelector('a.g-link');
          if (!guideId || !link) return;

          link.addEventListener('click', function () {
            try {
              var raw = JSON.parse(localStorage.getItem('ks-guide-clicks') || '{}');
              raw[guideId] = Number(raw[guideId] || 0) + 1;
              localStorage.setItem('ks-guide-clicks', JSON.stringify(raw));
            } catch (_) {}
          });
        })(cards[i]);
      }
    }

    function bindSearch() {
      var input = document.getElementById('guide-search');
      var count = document.getElementById('guide-count');
      var list = document.getElementById('guide-list');
      if (!input || !count || !list) return;

      function update() {
        var q = String(input.value || '').toLowerCase().trim();
        var cards = list.querySelectorAll('.g-block');
        var shown = 0;

        for (var i = 0; i < cards.length; i++) {
          var card = cards[i];
          var title = getTitle(card).toLowerCase();
          var visible = !q || title.indexOf(q) !== -1;
          card.style.display = visible ? '' : 'none';
          if (visible) shown++;
        }

        count.textContent = shown + ' / ' + cards.length;
      }

      input.addEventListener('input', update);
      update();
    }

    function initGuideIndex() {
      buildToc();
      buildReco();
      bindClicks();
      bindSearch();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initGuideIndex);
    } else {
      initGuideIndex();
    }
  })();
  </script>
