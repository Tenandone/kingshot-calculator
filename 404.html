<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Redirecting…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="refresh" content="0; url=/" />
  <script>
    (function() {
      var l = window.location;
      var p = l.pathname + l.search + l.hash;
      if (p && p !== '/' && !p.startsWith('/?p=')) {
        l.replace('/?p=' + encodeURIComponent(p));
      }
    })();
  </script>
  <noscript>
    JavaScript is disabled. Go to <a href="/">Home</a>.
  </noscript>
</head>
<body></body>
</html>
