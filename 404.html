<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Redirecting…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>
    (function() {
      var l = window.location;
      var p = l.pathname + l.search + l.hash;

      // / 자체는 홈이므로 제외
      // 이미 /?p= 로 들어온 경우도 제외
      if (p && p !== '/' && !p.startsWith('/?p=')) {
        l.replace('/?p=' + encodeURIComponent(p));
      } else {
        l.replace('/');
      }
    })();
  </script>
  <noscript>
    JavaScript is disabled. Go to <a href="/">Home</a>.
  </noscript>
</head>
<body></body>
</html>
