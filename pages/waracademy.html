      border:0;

      box-shadow:0 2px 5px rgba(0,0,0,.08);

      cursor:pointer;
      transition:transform .2s, box-shadow .2s;
      text-align:left;

      height:70px;
      border-radius:8px;
      flex-shrink:0;

      font-size:15px;
      color:#111;

      font-size:13px;
      color:#555;
      line-height:1.3;
    }

    .wa-card:hover{
      transform:translateY(-3px);
      box-shadow:0 4px 10px rgba(0,0,0,.1);
    }

    .wa-card.active{
      outline:2px solid #2b7cff;
      box-shadow:0 0 0 3px rgba(43,124,255,.2);
    }

    .research-detail{
      background:#fff;
      padding:16px;
      border-radius:10px;
      box-shadow:0 2px 6px rgba(0,0,0,.08);
      margin-top:10px;
      overflow-x:auto;

      padding:15px;

      margin:0 0 8px;
      font-size:18px;
    }

    .tg-meta h3{
      margin:14px 0 8px;
      font-size:16px;
    }

    .tg-meta ul{
      margin:0;
      padding-left:16px;
      line-height:1.7;
    }

    .tg-table{
      width:100%;
      border-collapse:collapse;
      margin-top:14px;
      font-size:14px;
      background:#fff;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 2px 6px rgba(0,0,0,.05);
      min-width:980px;
    }

    .tg-table thead th{
      background:linear-gradient(180deg,#f5f5f5,#ececec);
      color:#222;
      font-weight:600;
      padding:8px 10px;
      border-bottom:2px solid #ddd;
      text-align:center;
      position:sticky;
      top:0;
      z-index:1;
      white-space:nowrap;
    }

    .tg-table tbody td{
      padding:7px 10px;
      border:1px solid #eee;
      text-align:center;
      vertical-align:middle;
      line-height:1.4;
    }

    .tg-table tbody tr:nth-child(even){
      background:#fafafa;
    }

    .tg-table tbody tr:hover{
      background:#f0f7ff;
      transition:background .15s;
    }

    .tg-table .tg-total td{
      font-weight:700;
      background:#fff7e6;
      border-top:2px solid #f0c36d;
    }

    @media (max-width: 768px){
