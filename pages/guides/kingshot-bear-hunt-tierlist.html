<!doctype html>
<html lang="ko" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />

  <title data-i18n="bearTier.meta.title">곰사냥 집결원 티어 (A/B/C/No-Go)</title>
  <meta name="description"
        content="킹샷 곰사냥 집결 참여 시 A/B/C/절대 집결 금지 티어와 집결장 최적 조합 정리"
        data-i18n-attr="content:bearTier.meta.desc" />

  <style>
    *{box-sizing:border-box}

    :root{
      --brand:#0b57d0;
      --fg:#0b0d12;--muted:#6b7280;--bd:#e5e7eb;--card:#f8fafc;

      /* Tier colors */
      --best:#db2777;
      --a:#16a34a;--b:#f59e0b;--c:#3b82f6;--w:#ef4444;

      --radius:16px;--gap:12px;

      --surface:#fff;--bg:#fff;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --fg:#e8eaed;--muted:#c2c7d0;--bd:#2a2a2a;--card:#12161f;
        --surface:#121212;--bg:#0b0b0b;
      }
    }

    html,body{
      margin:0;background:var(--bg);color:var(--fg);
      font:15px/1.55 system-ui,-apple-system,"Segoe UI",Roboto,Pretendard,
        "Noto Sans KR","Noto Sans JP","Noto Sans SC","Noto Sans TC",Arial,sans-serif;
    }
    img{display:block;max-width:100%}
    a{color:var(--brand);text-decoration:none}
    a:hover{text-decoration:underline}

    /* ===== Standard Guide Topbar (Back / Language) ===== */
    .topbar{
      position:sticky;top:0;z-index:50;
      background:var(--surface);
      border-bottom:1px solid var(--bd);
    }
    .topbar-inner{
      max-width:1100px;margin:0 auto;
      padding:10px 16px;
      display:flex;justify-content:space-between;align-items:center;
      gap:12px;
    }
    .backlink{
      font:800 14px/1 system-ui,-apple-system,"Segoe UI",Roboto,Pretendard,sans-serif;
      color:var(--brand);
      white-space:nowrap;
    }
    .langbox{
      display:flex;align-items:center;gap:10px;
      white-space:nowrap;
    }
    .langbox label{
      font-size:14px;color:var(--muted);font-weight:700;
    }
    select{
      padding:8px 10px;border-radius:10px;
      border:1px solid var(--bd);
      background:var(--surface);color:var(--fg);
      font:700 14px/1 system-ui,-apple-system,"Segoe UI",Roboto,Pretendard,sans-serif;
      outline:none;
    }

    /* ===== Content ===== */
    .wrap{max-width:1100px;margin:0 auto;padding:18px}
    h1{margin:10px 0 10px;font-size:clamp(22px,3vw,34px);letter-spacing:-0.02em}
    .notice{margin:6px 0;color:var(--muted);font-size:13px}
    .notice .muted{color:var(--muted)}
    .notice strong{color:inherit}

    .tier{border:1px solid var(--bd);border-radius:var(--radius);background:var(--surface);margin:16px 0;overflow:hidden}
    .tier>header{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--bd)}
    .tag{display:inline-flex;align-items:center;padding:4px 10px;border-radius:999px;font-weight:900;font-size:13px;color:#fff}
    .a{background:var(--a)} .b{background:var(--b)} .c{background:var(--c)} .w{background:var(--w)} .best{background:var(--best)}
    .desc{font-size:13px;color:var(--muted);font-weight:700}

    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:var(--gap);padding:14px;justify-items:center}
    .card{border:1px solid var(--bd);background:var(--card);border-radius:12px;padding:10px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;width:100%}
    .img{width:92px;height:92px;border-radius:12px;border:1px solid var(--bd);object-fit:cover;background:var(--surface);margin:0 auto}
    .name{font-weight:800;font-size:13px;text-align:center}
    .hint{font-size:12px;color:var(--muted);text-align:center;font-weight:700}
    @media print{.hint{display:none}}
  </style>

    <h1 data-i18n="bearTier.h1">곰사냥 집결원 티어</h1>

    <p class="notice" data-i18n="bearTier.notice.line1">
      곰사냥은 <b>집결원 3자리 중 첫 번째</b> + <b>첫 번째 영웅의 ‘원정 1번 스킬’</b>만 적용됩니다.
    </p>
    <p class="notice" data-i18n="bearTier.notice.line2">
      이 섹션은 <b>A등급</b>, <b>B등급</b>, <b>C등급</b>, <b>절대 집결 금지</b>만 간단히 정리합니다.
    </p>
    <p class="notice" data-i18n="bearTier.notice.line3">
      곰사냥 집결원에는 집결장으로 활용되는 영웅이 포함되어있습니다. 현재 최고의 집결장 조합은 아래와 같습니다.
      <span class="muted">(업데이트에 따라 변경될 수 있음)</span>
    </p>

    <!-- Rally Leader -->
    <section class="tier-group">
      <h2 data-i18n="bearTier.h2.leader" style="margin:20px 0 10px;font-size:18px;font-weight:900">Rally Leader</h2>

      <div class="tier">
        <header>
          <span id="bestTag" class="tag best">Best</span>
        </header>

        <!-- ✅ Rally Leader 3 heroes: Amadeus / Yang / Petra -->
        <div class="grid">
          <div class="card">
            <img src="/img/heroes/Amadeus/img_001.webp" alt="Amadeus" class="img">
            <div class="name">Amadeus</div>
          </div>

          <div class="card">
            <img src="/img/heroes/Yang/img_001.webp" alt="Yang" class="img">
            <div class="name">Yang</div>
          </div>

          <div class="card">
            <img src="/img/heroes/Petra/img_001.webp" alt="Petra" class="img">
            <div class="name">Petra</div>
          </div>
        </div>
      </div>
    </section>

    <!-- Rally Joiner -->

      <div id="tiers"></div>
    </section>
  </main>

    function normalizeLang(raw){
      raw = String(raw || '').replace('_','-');
      var low = raw.toLowerCase();
      if (!low) return 'ko';
      if (low.indexOf('ko') === 0) return 'ko';
      if (low.indexOf('en') === 0) return 'en';
      if (low.indexOf('ja') === 0) return 'ja';
      if (low.indexOf('zh') === 0){
        if (low.indexOf('tw') >= 0 || low.indexOf('hk') >= 0 || low.indexOf('mo') >= 0) return 'zh-TW';
        return 'zh-CN';
      }
      return 'en';
    }

    function currentLang(){
      try{
        var p = new URLSearchParams(location.search);
        var q = p.get('lang');
        if (q) return normalizeLang(q);
      }catch(_e){}
      try{
        var ls = localStorage.getItem('lang');
        if (ls) return normalizeLang(ls);
      }catch(_e2){}
      return normalizeLang(navigator.language || 'ko');
    }

    function dict(){
      var lang = currentLang();
      return LOCAL_I18N[lang] || LOCAL_I18N.ko;
    }

    function t(key){
      var d = dict();
      return (d && d[key] != null) ? d[key] : (LOCAL_I18N.ko ? LOCAL_I18N.ko[key] : '');
    }

      var bestTag = document.getElementById('bestTag');
      if (bestTag) bestTag.textContent = t('bearTier.tag.best') || 'Best';

      var nodes = document.querySelectorAll('[data-i18n]');
      for (var i=0;i<nodes.length;i++){
        var el = nodes[i];
        var key = el.getAttribute('data-i18n');
        var v = t(key);
        if (v != null && v !== '') el.innerHTML = v;
      }

      var attrs = document.querySelectorAll('[data-i18n-attr]');
      for (var j=0;j<attrs.length;j++){
        var el2 = attrs[j];
        var raw = el2.getAttribute('data-i18n-attr') || '';
        var pairs = raw.split(';');
        for (var p=0;p<pairs.length;p++){
          var pair = (pairs[p] || '').trim();
          if (!pair) continue;
          var sp = pair.split(':');
          var attr = (sp[0] || '').trim();
          var key2 = (sp[1] || '').trim();
          if (!attr || !key2) continue;
          var v2 = t(key2);
          if (v2 != null && v2 !== '') el2.setAttribute(attr, v2);
        }
      }

      var title = t('bearTier.meta.title');
      if (title) document.title = title;

      var langNow = currentLang();
      document.documentElement.lang = langNow;
      document.documentElement.dir = 'ltr';
    }

    // ===== Tier data (Joiner) =====
    var TIER_DATA = {
      A:['Amadeus','Chenko','Yeonwoo','Amane','Margot','Vivian'],
      B:['Hilde','Yang'],
      C:['Zoe','Marlin','Petra','Rosa','Jaeger','Longfei','Thrud'],
      NO_GO:['Alcar','Diana','Edwin','Eric','Fahd','Forrest','Gordon','Helga','Howard','Jabel','Olive','Quinn','Saul','Seth','Triton','Sophia']
    };

    // 필요 시 이미지 경로 별칭 매핑
    var ALIASES = {};

    function imgCandidates(name){
      if (ALIASES[name]) return [ALIASES[name]];
      var base = '/img/heroes/' + encodeURIComponent(name) + '/img_001';
      return [base + '.webp', base + '.png', base + '.jpg'];
    }

    function avatar(name){
      var img = document.createElement('img');
      img.className = 'img';
      img.alt = name;

      var list = imgCandidates(name);
      var idx = 0;

      function tryNext(){
        if (idx < list.length) img.src = list[idx++];
      }
      img.addEventListener('error', tryNext);
      tryNext();
      return img;
    }

    function noteFor(name){
      var lang = currentLang();
      var m = NOTES_I18N[lang] || NOTES_I18N.ko || {};
      return m[name] || '';
    }

    function card(name){
      var el = document.createElement('div');
      el.className = 'card';

      el.appendChild(avatar(name));

      var nm = document.createElement('div');
      nm.className = 'name';
      nm.textContent = name;
      el.appendChild(nm);

      var h = noteFor(name);
      if (h){
        var d2 = document.createElement('div');
        d2.className = 'hint';
        d2.textContent = h;
        el.appendChild(d2);
      }
      return el;
    }

    function renderTier(titleKey, tagClass, list){
      var sec = document.createElement('section');
      sec.className = 'tier';

      var head = document.createElement('header');

      var tag = document.createElement('span');
      tag.className = 'tag ' + tagClass;
      tag.textContent = t(titleKey) || titleKey;

      var desc = document.createElement('div');
      desc.className = 'desc';

      var dk = 'bearTier.desc.no';
      if (tagClass === 'a') dk = 'bearTier.desc.a';
      else if (tagClass === 'b') dk = 'bearTier.desc.b';
      else if (tagClass === 'c') dk = 'bearTier.desc.c';
      desc.textContent = t(dk) || '';

      head.appendChild(tag);
      head.appendChild(desc);

      var grid = document.createElement('div');
      grid.className = 'grid';
      for (var i=0;i<list.length;i++){
        grid.appendChild(card(list[i]));
      }

      sec.appendChild(head);
      sec.appendChild(grid);
      return sec;
    }

    function mount(){
      applyI18N();

      var sel = document.getElementById('langSwitcher');
      var langNow = currentLang();
      if (sel && sel.value !== langNow) sel.value = langNow;

      var root = document.getElementById('tiers');
      if (!root) return;

      root.innerHTML = '';
      if ((TIER_DATA.A||[]).length) root.appendChild(renderTier('bearTier.tier.a','a',TIER_DATA.A));
      if ((TIER_DATA.B||[]).length) root.appendChild(renderTier('bearTier.tier.b','b',TIER_DATA.B));
      if ((TIER_DATA.C||[]).length) root.appendChild(renderTier('bearTier.tier.c','c',TIER_DATA.C));
      if ((TIER_DATA.NO_GO||[]).length) root.appendChild(renderTier('bearTier.tier.no','w',TIER_DATA.NO_GO));
    }

    function setLang(next){
      next = normalizeLang(next);
      try { localStorage.setItem('lang', next); } catch(_e) {}

      try{
        var u = new URL(location.href);
        u.searchParams.set('lang', next);
        history.replaceState(null, '', u.pathname + u.search + u.hash);
      }catch(_e2){}

      mount();
    }

    function initTopbar(){
      var sel = document.getElementById('langSwitcher');
      if (!sel) return;
      sel.value = currentLang();
      sel.addEventListener('change', function(e){
        setLang(e.target.value);
      });
    }

    if (document.readyState === 'loading'){
      document.addEventListener('DOMContentLoaded', function(){
        initTopbar();
        mount();
      }, { once:true });
    } else {
      initTopbar();
      mount();
    }
  })();
  </script>
</body>
</html>
