<!-- pages/calculators/charm.html (최적화 본) -->
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>영주 보석 계산기 | KingshotData KR</title>
  <!-- 스타일은 /css/common.css 의 .calc-wrap / .calc-card 규칙을 사용 -->
</head>
<body>
  <main id="calc-ui" class="calc-wrap" aria-labelledby="charm-title">
    <!-- 헤더/안내 -->
    <section class="calc-card">
      <h2 id="charm-title" class="calc-title">영주 보석 계산기</h2>
      <p class="calc-desc">현재 보석 레벨, 목표 레벨, 병종별 개수를 입력하면 필요한 <strong>보석매뉴얼/보석도면</strong>과 <strong>총 속성 증가</strong>를 계산합니다.</p>

      <h3 class="calc-desc">사용 방법</h3>
      <ol class="calc-desc" style="margin-left:18px">
        <li>현재 보석 <strong>레벨</strong>과 <strong>목표 레벨</strong>을 선택하세요.</li>
        <li>업그레이드할 보석의 <strong>병종별 개수</strong>를 입력하세요. (기병·보병·궁병 / 예: 3·3·3)</li>
        <li><strong>계산하기</strong> 버튼을 누르세요.</li>
      </ol>
    </section>

    <!-- 계산기 본체 마운트 영역 -->
    <section class="calc-card" style="margin-top:14px">
      <div id="charm-calc" aria-live="polite"></div>
    </section>

    <!-- 참고/주의 -->
    <section class="calc-card" style="margin-top:14px">
  <h3 class="calc-title" style="font-size:18px">주의사항</h3>
  <div class="notice-box">
    <!-- 📝 여기를 네 문구로 자유롭게 바꾸면 됨 -->
    <p>본 자료는 인게임 표기값을 기반으로 정리한 팬메이드 데이터입니다.</p>
    <ul class="notice-list">
      <li>패치/밸런스 조정에 따라 수치가 달라질 수 있습니다.</li>
      <li>오타·오류 제보는 <a href="#/about">문의하기</a>로 부탁드립니다.</li>
    </ul>
  </div>
</section>

  </main>

  <!-- ⚠️ 스크립트는 routes.js의 '/calc-charm' 라우트에서 동적 로드/초기화합니다. 여기서는 포함하지 않습니다. -->
  <!-- 단독 테스트가 필요하면 아래를 임시로 활성화하세요.
  <script src="/js/charm-calculator.js?v=20250823b"></script>
  <script>
    window.initCharmCalculator?.({
      mount: '#charm-calc',
      jsonUrl: '/data/governor-charm.json'
    });
  </script>
  -->
</body>
</html>
