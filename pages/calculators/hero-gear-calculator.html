  <meta property="og:description" content="일반 강화, 단련, 마스터리 제작 구간별 필요 재료를 빠르게 계산해보세요." />

  <link rel="stylesheet" href="/css/common.css?v=20260327" />

  <style>
    .hero-gear-page{
      --bg:#ffffff;
      --panel:#ffffff;
      --border:#e5e7eb;
      --text:#111827;
      --muted:#6b7280;
      --shadow:0 12px 30px rgba(15,23,42,.08);
    }

    .hero-gear-page,
    .hero-gear-page *{
      box-sizing:border-box;
    }

    .hero-gear-page{
      background:var(--bg);
      color:var(--text);
    }

    .hero-gear-page .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:24px 16px 80px;
    }

    .hero-gear-page .breadcrumb{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      margin-bottom:18px;
      font-size:13px;
      color:var(--muted);
    }

    .hero-gear-page .breadcrumb a{
      color:var(--muted);
      text-decoration:none;
    }

    .hero-gear-page .panel{
      padding:22px;
      border:1px solid var(--border);
      border-radius:24px;
      background:var(--panel);
      box-shadow:var(--shadow);
    }

    .hero-gear-page .calc-mount{
      margin-top:0;
    }

    @media (max-width:768px){
      .hero-gear-page .wrap{
        padding:18px 14px 64px;
      }

      .hero-gear-page .panel{
        padding:16px;
        border-radius:20px;
      }
    }
  </style>
</head>
<body>
  <main class="hero-gear-page">
    <div class="wrap">
      <nav class="breadcrumb" aria-label="브레드크럼">
        <a href="/">홈</a>
        <span>/</span>
        <a href="/calculators/">계산기</a>
        <span>/</span>
        <span>영웅 장비 계산기</span>
      </nav>

      <section class="panel" aria-label="영웅 장비 계산기">
        <div id="hero-gear-calculator-root" class="calc-mount"></div>
      </section>
    </div>
  </main>

  <script src="/js/hero-gear-calculator.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (typeof window.initHeroGearCalculator === 'function') {
        window.initHeroGearCalculator({
          root: '#hero-gear-calculator-root'
        });
      }
    });
  </script>
</body>
</html>
