<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="킹샷 훈련 및 승급에 필요한 가속 일수 기준으로 병력 수, 전투력 증가, 최강영주·최강왕국(준비전)·지고의영주 점수를 계산할 수 있는 도구입니다." />
  <meta name="i18n-ns" content="common,trainCalc" />

  <title data-i18n="trainCalc.meta.title">Kingshot 훈련·승급 계산기</title>
  <link rel="stylesheet" href="/css/kingshot_calc.css?v=20250913">

  <style>
    #training-calc{
      max-width:1180px;
      margin:0 auto;
      padding:20px 16px 40px;
    }

    #training-calc h1{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin:0 0 18px;
      font-size:34px;
      line-height:1.2;
    }

    #training-calc .badge{
      display:none;
    }

    #training-calc .card{
      max-width:none;
      margin:0 0 14px;
      border-radius:18px;
      padding:18px;
      background:#fff;
      border:1px solid #e5e7eb;
      box-shadow:0 4px 14px rgba(15,23,42,.04);
    }

    #training-calc .grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:14px;
      max-width:none;
      margin:0;
    }

    #training-calc .col-3,
    #training-calc .col-12{
      min-width:0;
    }

    #training-calc .col-12{
      grid-column:1 / -1;
    }

    #training-calc label{
      display:block;
      margin:0 0 8px;
      font-size:14px;
      font-weight:700;
      color:#374151;
    }

    #training-calc select,
    #training-calc input,
    #training-calc button{
      width:100%;
      max-width:none;
    }

    #training-calc input[type="number"],
    #training-calc select{
      height:44px;
    }

    #training-calc .muted{
      line-height:1.7;
      color:#6b7280;
      font-size:14px;
    }

    #training-calc .about-note{
      margin-top:10px;
      padding-top:10px;
      border-top:1px dashed #e5e7eb;
      font-size:13px;
    }

    #training-calc .toggle{
      display:none;
    }

    #training-calc .warn{
      padding:12px 14px;
      border-radius:12px;
      background:#fff7ed;
      color:#9a3412;
      border:1px solid #fdba74;
      font-size:14px;
      margin-bottom:10px;
    }

    #training-calc .input-troops{
      display:none !important;
    }

    #training-calc #calcBtn{
      display:none;
      height:48px;
      font-weight:800;
    }

    #training-calc #result{
      display:none;
      margin-top:0;
    }

    #training-calc #result table{
      width:100%;
      max-width:none;
      margin:0;
      table-layout:fixed;
      border-collapse:collapse;
      background:#fff;
    }

    #training-calc #result thead th{
      font-size:14px;
      font-weight:800;
      background:#f8fafc;
      color:#111827;
    }

    #training-calc #result thead th:first-child,
    #training-calc #result tbody td:first-child{
      width:68%;
      text-align:left;
    }

    #training-calc #result thead th:nth-child(2),
    #training-calc #result tbody td:nth-child(2){
      width:32%;
      text-align:right;
    }

    #training-calc th,
    #training-calc td{
      padding:14px 14px;
      vertical-align:middle;
      border-bottom:1px solid #edf0f3;
      word-break:keep-all;
    }

    #training-calc tbody tr:nth-child(even){
      background:#fcfcfd;
    }

    #training-calc .kscalc-summary-head{
      display:flex;
      align-items:center;
      gap:14px;
      padding:16px 18px;
      margin:0 0 14px;
      background:#fff;
      border:1px solid rgba(0,0,0,.08);
      border-radius:16px;
      box-shadow:0 4px 14px rgba(0,0,0,.04);
    }

    #training-calc .kscalc-summary-head .thumb{
      width:58px;
      height:58px;
      flex:0 0 58px;
      border-radius:14px;
      overflow:hidden;
      background:#f3f4f6;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    #training-calc .kscalc-summary-head .thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    #training-calc .kscalc-summary-head .meta{
      min-width:0;
      flex:1;
    }

    #training-calc .kscalc-summary-head .eyebrow{
      font-size:12px;
      line-height:1.3;
      color:#6b7280;
      margin:0 0 4px;
    }

    #training-calc .kscalc-summary-head .title{
      font-size:18px;
      line-height:1.35;
      font-weight:800;
      color:#111827;
      margin:0 0 4px;
      word-break:keep-all;
    }

    #training-calc .kscalc-summary-head .desc{
      font-size:13px;
      line-height:1.5;
      color:#4b5563;
      margin:0;
      word-break:keep-all;
    }

    #training-calc .kscalc-cards{
      display:grid;
      grid-template-columns:repeat(5, minmax(0, 1fr));
      gap:12px;
      margin:0 0 16px;
    }

    #training-calc .kscalc-card{
      background:#fff;
      border:1px solid rgba(0,0,0,.08);
      border-radius:16px;
      padding:14px;
      box-shadow:0 4px 14px rgba(0,0,0,.04);
      min-width:0;
    }

    #training-calc .kscalc-card-top{
      display:flex;
      align-items:center;
      gap:8px;
      margin-bottom:8px;
    }

    #training-calc .kscalc-card-icon{
      width:18px;
      height:18px;
      object-fit:contain;
      flex:0 0 18px;
    }

    #training-calc .kscalc-card-label{
      font-size:12px;
      line-height:1.35;
      color:#6b7280;
      word-break:keep-all;
    }

    #training-calc .kscalc-card-value{
      font-size:18px;
      line-height:1.25;
      font-weight:800;
      color:#111827;
      word-break:break-word;
    }

    #training-calc .kscalc-card-sub{
      font-size:12px;
      line-height:1.4;
      color:#9ca3af;
      margin-top:6px;
      word-break:keep-all;
    }

    #training-calc .kscalc-row-label{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
    }

    #training-calc .kscalc-row-icon{
      width:18px;
      height:18px;
      object-fit:contain;
      flex:0 0 18px;
    }

    @media (max-width:1100px){
      #training-calc .kscalc-cards{
        grid-template-columns:repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width:860px){
      #training-calc .grid{
        grid-template-columns:1fr 1fr;
      }

      #training-calc .kscalc-cards{
        grid-template-columns:repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width:640px){
      #training-calc{
        padding:16px 12px 32px;
      }

      #training-calc h1{
        font-size:28px;
        margin-bottom:14px;
      }

      #training-calc .card{
        padding:14px;
        border-radius:14px;
      }

      #training-calc .grid{
        grid-template-columns:1fr;
      }

      #training-calc .kscalc-cards{
        grid-template-columns:1fr;
      }

      #training-calc .kscalc-summary-head{
        align-items:flex-start;
        padding:14px;
      }

      #training-calc th,
      #training-calc td{
        padding:12px 10px;
        font-size:13px;
      }

      #training-calc #result thead th:first-child,
      #training-calc #result tbody td:first-child{
        width:60%;
      }

      #training-calc #result thead th:nth-child(2),
      #training-calc #result tbody td:nth-child(2){
        width:40%;
      }
    }
  </style>

<body>
  <div id="training-calc">
    <h1>
      <span data-i18n="trainCalc.title">킹샷 훈련·승급 계산기</span>
      <span class="badge" data-i18n="trainCalc.badge">가속일수 ↔ 병력수</span>
    </h1>

    <div class="card">
      <h2 style="margin:0 0 8px;font-size:20px;" data-i18n="trainCalc.about.title">계산 안내</h2>
      <p class="muted" style="margin:0;" data-i18n="trainCalc.about.p1">
        가속 일수 기준으로 훈련 또는 승급 가능한 병력 수와 전투력 증가, 최강영주·최강왕국(준비전)·지고의영주 점수를 계산합니다.
      </p>
      <div class="muted about-note" data-i18n="trainCalc.about.note">
        입력한 훈련 속도는 자동 반영되며, 병력 수 입력 방식은 사용하지 않습니다.
      </div>
    </div>

    <div class="card">
      <div class="grid">
        <div class="col-3">
          <label for="mode" data-i18n="trainCalc.form.mode">모드</label>
          <select id="mode">
            <option value="training" data-i18n="trainCalc.mode.training">훈련 (Training)</option>
            <option value="promotion" data-i18n="trainCalc.mode.promotion">승급 (Promotion)</option>
          </select>
        </div>

        <div class="col-3" id="fromTierWrap">
          <label for="fromTier" data-i18n="trainCalc.form.fromTier">현재 티어</label>
          <select id="fromTier"></select>
        </div>

        <div class="col-3">
          <label for="toTier" data-i18n="trainCalc.form.toTier">목표 티어</label>
          <select id="toTier"></select>
        </div>

        <div class="col-3">
          <label for="trainSpeed" data-i18n="trainCalc.form.trainSpeed">훈련 속도 (%)</label>
          <input type="number" id="trainSpeed" value="0" min="0" max="1000" step="1" />
        </div>

        <div class="col-12" style="display:none;">
          <label data-i18n="trainCalc.form.inputMode">입력 방식</label>
          <div class="toggle">
            <span class="pill active" id="modeTime" data-i18n="trainCalc.form.modeTime">가속 일수 → 병력 수 계산</span>
            <span class="pill" id="modeTroops" data-i18n="trainCalc.form.modeTroops">병력 수 → 필요 가속 일수</span>
          </div>
        </div>

        <div class="col-3 input-time">
          <label for="speedDays" data-i18n="trainCalc.form.speedDays">가속 일수 (일)</label>
          <input type="number" id="speedDays" value="100" min="0" step="0.1" />
        </div>

        <div class="col-3 input-troops">
          <label for="count" data-i18n="trainCalc.form.count">병력 수 (명)</label>
          <input type="number" id="count" value="100000" min="1" step="1" />
        </div>

        <div class="col-12 row">
          <button id="calcBtn" data-i18n="trainCalc.actions.calculate">계산하기</button>
        </div>
      </div>
    </div>

    <div id="summary" class="card">
      <div id="warn" class="warn" style="display:none;" data-i18n="trainCalc.warn.noData">
        매칭되는 데이터가 없습니다. 티어와 모드를 확인하세요.
      </div>

      <div id="result" style="display:none;">
        <table>
          <thead>
            <tr>
              <th data-i18n="trainCalc.table.metric">지표</th>
              <th class="num" data-i18n="trainCalc.table.total">총합</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/js/i18n.js?v=20260319"></script>
  <script src="/js/training-calculator.js?v=20260319-final"></script>
  <script>
    window.I18N.init({
      namespaces: ['common', 'trainCalc'],
      root: document
    }).then(function () {
      window.initTrainingCalculator({
        mount: '#training-calc',
        jsonUrl: '/data/calculators/training.json'
      });
    });
  </script>
</body>
</html>
