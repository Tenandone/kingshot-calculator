<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>계산기 | KingshotData</title>
  <meta name="description" content="건물계산기, 영주장비계산기, 영웅장비계산기, 영주보석계산기, 병력훈련계산기, 펫계산기를 한곳에서 확인하세요." />
  <meta name="robots" content="index,follow" />
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      background:#f8fafc;
      color:#111827;
      font:14px/1.6 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Pretendard,Arial,sans-serif;
    }

    #calc-hub{
      max-width:1200px;
      margin:0 auto;
      padding:18px 16px 32px;
    }

    #calc-hub .hub-card{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:18px;
      padding:18px;
      box-shadow:0 8px 24px rgba(17,24,39,.04);
    }

    #calc-hub .hub-title{
      margin:0;
      text-align:center;
      font-size:22px;
      font-weight:800;
      color:#111827;
      letter-spacing:-0.02em;
      line-height:1.3;
    }

    #calc-hub .hub-grid{
      display:grid;
      grid-template-columns:repeat(6, minmax(0, 1fr));
      gap:12px;
    }

    #calc-hub .hub-link{
      display:flex;
      flex-direction:column;
      text-decoration:none;
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:14px;
      overflow:hidden;
      min-width:0;
      text-align:center;
      transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
    }

    #calc-hub .hub-link:hover{
      transform:translateY(-2px);
      box-shadow:0 6px 18px rgba(0,0,0,.08);
      border-color:#d1d5db;
    }

    #calc-hub .hub-thumb{
      width:100%;
      aspect-ratio:1 / 1;
      background:#f8fafc;
      border-bottom:1px solid #eef2f7;
      display:grid;
      place-items:center;
      padding:10px;
    }

    #calc-hub .hub-thumb img{
      width:68%;
      height:68%;
      object-fit:contain;
      display:block;
    }

    #calc-hub .hub-body{
      padding:12px 10px;
      min-width:0;
    }

    #calc-hub .hub-card-title{
      margin:0;
      font-size:16px;
      font-weight:700;
      color:#111827;
      line-height:1.3;
      letter-spacing:-0.02em;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
      word-break:keep-all;
      overflow-wrap:anywhere;
    }

    @media (max-width:1100px){
      #calc-hub .hub-grid{
        grid-template-columns:repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width:640px){
      #calc-hub{
        padding:14px 12px 24px;
      }

      #calc-hub .hub-card{
        padding:14px;
        border-radius:16px;
      }

      #calc-hub .hub-title{
        font-size:20px;
      }

      #calc-hub .hub-grid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
        gap:10px;
      }

      #calc-hub .hub-link{
        border-radius:12px;
      }

      #calc-hub .hub-thumb{
        padding:8px;
      }

      #calc-hub .hub-thumb img{
        width:60%;
        height:60%;
      }

      #calc-hub .hub-body{
        padding:10px 8px;
      }

      #calc-hub .hub-card-title{
        font-size:14px;
        line-height:1.28;
      }
    }
  </style>
</head>
<body>
  <main id="calc-hub" aria-labelledby="calc-title">
    <section class="hub-card">
      <h2 id="calc-title" class="hub-title" data-i18n="calcHub.title">계산기</h2>
    </section>

    <section class="hub-card" style="margin-top:14px;">
      <div class="hub-grid" aria-label="계산기 목록">
        <a class="hub-link" href="#calc-building">
          <div class="hub-thumb">
            <img src="/img/icons/towncenter.webp" alt="건물계산기" loading="lazy" decoding="async">
          </div>
          <div class="hub-body">
            <h3 class="hub-card-title" data-i18n="calcHub.cards.building.title">건물계산기</h3>
          </div>
        </a>

        <a class="hub-link" href="#calc-gear">
          <div class="hub-thumb">
            <img src="/img/database/Governor%20Gear/governor-gear.webp" alt="영주장비계산기" loading="lazy" decoding="async">
          </div>
          <div class="hub-body">
            <h3 class="hub-card-title" data-i18n="calcHub.cards.gear.title">영주장비계산기</h3>
          </div>
        </a>

        <a class="hub-link" href="#calc-hero-gear">
  <div class="hub-thumb">
    <img src="/img/hero-gear/hero-gear.webp" alt="영웅장비계산기" loading="lazy" decoding="async">
  </div>
  <div class="hub-body">
    <h3 class="hub-card-title" data-i18n="calcHub.cards.heroGear.title">영웅장비계산기</h3>
  </div>
</a>

        <a class="hub-link" href="#calc-charm">
          <div class="hub-thumb">
            <img src="/img/database/Governor%20Charm/governor-charms-300x282.webp" alt="영주보석계산기" loading="lazy" decoding="async">
          </div>
          <div class="hub-body">
            <h3 class="hub-card-title" data-i18n="calcHub.cards.charm.title">영주보석계산기</h3>
          </div>
        </a>

        <a class="hub-link" href="#calc-training">
          <div class="hub-thumb">
            <img src="/img/icons/infantry.webp" alt="병력훈련계산기" loading="lazy" decoding="async">
          </div>
          <div class="hub-body">
            <h3 class="hub-card-title" data-i18n="calcHub.cards.training.title">병력훈련계산기</h3>
          </div>
        </a>

        <a class="hub-link" href="/calc-pet">
          <div class="hub-thumb">
            <img src="/img/pet/graywolf.webp" alt="펫계산기" loading="lazy" decoding="async">
          </div>
          <div class="hub-body">
            <h3 class="hub-card-title" data-i18n="calcHub.cards.pet.title">펫계산기</h3>
          </div>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
