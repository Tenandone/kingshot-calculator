<!-- pages/heroes.html — 단독 진입 시 홈의 heroes 섹션으로 리다이렉트, SPA 내부 include 시 정상 동작 -->
<script>
(function () {
  try {
    if (window === window.top) {
      const p = location.pathname || "";
      if (
        p.endsWith("/pages/heroes.html") ||
        p.endsWith("/pages/heroes.html/") ||
        /\/pages\/heroes\.html$/i.test(p)
      ) {
        const usp = new URLSearchParams(location.search);
        let lang = (usp.get("lang") || "").toLowerCase();

        if (!/^(ko|en|ja|zh-tw)$/.test(lang)) {
          lang = "ko";
        }

        location.replace("/?lang=" + encodeURIComponent(lang) + "#heroes");
      }
    }
  } catch (_) {}
})();
</script>
