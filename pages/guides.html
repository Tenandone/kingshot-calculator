<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="db-title" content="guides.title">
  <meta name="description" content="guides.metaDesc">
  <title>KingshotData.kr — Guides</title>

  <link rel="stylesheet" href="/css/guides.css?v=now">

  <!-- i18n (번역은 나중에) -->
  <script src="/js/i18n.js?v=now" defer></script>
  <script>
  document.addEventListener('DOMContentLoaded', async () => {
    const raw = (localStorage.getItem('lang') || navigator.language || 'ko').replace('_','-');
    const lang = raw.startsWith('zh') ? (raw.toLowerCase().includes('tw') ? 'zh-TW' : 'zh-CN')
                                      : (raw.split('-')[0] || 'ko');
    await I18N.init({ lang, namespaces: ['db','guides'] });
    I18N.applyTo(document);
  });
  </script>

  <!-- 공통 스크립트 (TOC/검색/partial 로더 포함) -->
  <script src="/js/guides.js?v=now" defer></script>

  <style>
    /* 라우터 타지 않는 내부 앵커 스크롤 보조 */
    .anchor-link { cursor:pointer; }
  </style>
</head>
<body>

  <!-- 상단: 제목 + 검색 + 목차 -->
  <section class="guides-head">
    <h1 id="page-title" data-i18n="guides.title">가이드</h1>

    <div class="guides-tools">
      <input id="guide-search" type="search"
             placeholder=""
             data-i18n-attr="placeholder:guides.search.placeholder; aria-label:guides.search.aria">
      <span id="guide-count" class="muted"></span>
    </div>

    <nav id="guide-toc" aria-label="가이드 목차"></nav>
  </section>

  <hr class="sep">

  <!-- 카드 -->
<a class="guide-card anchor-link" href="#bear">
  <h3 class="guide-card__title" data-i18n="guide.bear.title">곰사냥 집결장 조합 추천</h3>
</a>

<!-- 섹션 타이틀 -->
<section class="g-block" id="bear" data-guide="bear">
  <h2 class="g-title" data-i18n="guide.bear.title">곰사냥 집결장 조합 추천</h2>
  <div data-include="/pages/guides/bear-hunt-guide.html"></div>
</section>


  <script>
  // 해시(#bear) 클릭 시 라우터로 넘어가지 않도록 가로채서 스크롤만 수행
  document.addEventListener('click', (e) => {
    const a = e.target.closest('a.anchor-link[href^="#"]');
    if (!a) return;
    const sel = a.getAttribute('href');
    const target = document.querySelector(sel);
    if (!target) return;
    e.preventDefault();                               // 라우터로 안 가게 막음
    target.scrollIntoView({ behavior: 'smooth' });    // 부드럽게 스크롤
    // URL은 바꾸지 않거나, 표시만 바꾸고 싶으면 아래 주석 해제(라우터 미트리거)
    // history.replaceState(null, '', location.pathname + location.search + '#/guides' + sel);
  });
  </script>
</body>
</html>
