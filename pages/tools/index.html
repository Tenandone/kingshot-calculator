<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tools (실험실)</title>
  <style>
    :root{
      --bg:#f6f8fc;
      --panel:#ffffff;
      --line:#e7ecf5;
      --txt:#111827;
      --mut:#6b7280;
      --shadow: 0 14px 34px rgba(16,24,40,.08);
      --radius: 18px;
      --radius2: 14px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background: var(--bg);
      color:var(--txt);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    .wrap{
      max-width: 980px;
      margin: 22px auto 36px;
      padding: 0 16px;
    }
    .panel{
      border:1px solid var(--line);
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .head{
      padding: 16px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .title{
      font-weight:1000;
      font-size:18px;
      margin:0;
    }
    .sub{
      margin:6px 0 0;
      color:var(--mut);
      font-size:12px;
      line-height:1.4;
    }
    .grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 12px;
      padding: 16px;
    }
    @media (max-width: 860px){ .grid{ grid-template-columns: repeat(2, minmax(0,1fr)); } }
    @media (max-width: 560px){ .grid{ grid-template-columns: 1fr; } }

    .card{
      display:flex;
      gap:12px;
      padding: 14px;
      border:1px solid var(--line);
      border-radius: var(--radius2);
      background:#fff;
      text-decoration:none;
      color:inherit;
      transition: transform .12s ease, box-shadow .12s ease;
    }
    .card:hover{
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(16,24,40,.08);
    }
    .emoji{
      width:44px;height:44px;
      border-radius: 14px;
      background:#f2f5ff;
      border:1px solid #dbeafe;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      flex:0 0 auto;
    }
    .meta{ min-width:0; }
    .name{
      font-weight:1000;
      margin:0;
      font-size:14px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .desc{
      margin-top:6px;
      color:var(--mut);
      font-size:12px;
      line-height:1.4;
    }
    .link{
      margin-left:auto;
      color:var(--mut);
      font-size:12px;
      white-space:nowrap;
      align-self:center;
    }
  </style>
  <!-- GA4 -->
  <link rel="preconnect" href="https://www.googletagmanager.com">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TMGDGSEWW6"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-TMGDGSEWW6', { send_page_view: true });
  </script>

</head>
<body>
  <div class="wrap">
    <section class="panel" aria-label="Tools">
      <div class="head">
        <div>
          <h1 class="title">툴(실험실)</h1>
          <p class="sub">라우터/앱 수정 없이 정적 HTML로 바로 노출되는지 확인용</p>
        </div>
        <a href="/home" style="color:#2563eb;text-decoration:none;font-weight:900;font-size:12px;">홈으로</a>
      </div>

      <div class="grid">
        <!-- ✅ 툴 카드 1개 -->
        <a class="card" href="/tools/truegold.html">
          <div class="emoji">🪙</div>
          <div class="meta">
            <p class="name">2026 순금 소모표 (TG1–8)</p>
            <div class="desc">슬라이더로 TG 레벨별 소모량 확인</div>
          </div>
          <div class="link">열기 →</div>
        </a>
      </div>
    </section>
  </div>
</body>
</html>
