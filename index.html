  <script>
    (function () {
      const sp = new URLSearchParams(location.search);
      const urlLang = sp.get('lang');
      let saved = null; try { saved = localStorage.getItem('lang'); } catch(_){}
      const browser = (navigator.language || 'ko').slice(0,2);
      const initial = urlLang || saved || (browser === 'ko' ? 'ko' : 'en');
      document.documentElement.setAttribute('lang', initial);
      if (window.I18N?.init) I18N.init({ lang: initial, supported: ['ko','en','ja','zh-CN','zh-TW'] });
      if (!location.hash) location.replace('#/home'); // 기본 라우트
    })();
  </script>

    :root{ --nav-h:60px; }
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
    a{text-decoration:none;color:inherit}

    .site-header{background:#fff;border-bottom:1px solid #ddd;position:sticky;top:0;z-index:100}
    .nav-bar{max-width:1200px;margin:0 auto;padding:0 12px;display:flex;align-items:center;justify-content:space-between;height:var(--nav-h)}

    /* --- 데스크탑 우측 묶음 --- */

    .lootbar-banner img{height:20px;width:auto;filter:grayscale(100%)}
    .lootbar-banner span{font-size:10px;font-weight:300;margin-top:2px;align-self:flex-start;opacity:.4}
    .lootbar-banner:hover span{text-decoration:none}

    /* 배너 링크: 밑줄 제거(헤더/드로어 공통) */
    .cafe-banner, .cafe-banner:hover, .cafe-banner:focus,
    .lootbar-banner, .lootbar-banner:hover, .lootbar-banner:focus,
    .drawer .cafe-banner, .drawer .cafe-banner:hover, .drawer .cafe-banner:focus,
    .drawer .lootbar-banner, .drawer .lootbar-banner:hover, .drawer .lootbar-banner:focus {
      text-decoration: none !important;
    }

    .lang-switch select{padding:4px 8px;border:1px solid #ccc;border-radius:6px;background:#fff}
    .nav-right .lootbar-banner { margin-top: 14px; } /* 헤더에서 살짝 아래로 */

    /* 햄버거(모바일) */
    #menuToggle.hamburger{display:none;font-size:22px;background:none;border:0;color:#333;cursor:pointer}

    /* 반응형: 모바일에선 좌측 메뉴 숨기고 드로어 사용, 우측 묶음 감춤 */
    @media (max-width:768px){
      #primaryNav{display:none}
      #menuToggle.hamburger{display:inline-block}
      .nav-right{display:none}
      .brand-logo{height:34px}
    }

    /* ===== 드로어 ===== */
    .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:.2s;z-index:110}
    .drawer{
      position:fixed;top:0;right:0;height:100%;
      width:420px; /* 기본 */
      background:#fff;border-left:1px solid #e5e7eb;transform:translateX(100%);
      transition:transform .25s ease;z-index:120;display:flex;flex-direction:column
    }
    /* ✅ 모바일에서 정확히 50% 폭 */
    @media (max-width:768px){
      .drawer{ width:50vw !important; max-width:none !important; min-width:0 !important; }
    }

    .drawer header{height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid #eee}
    .drawer .section{padding:12px}
    .drawer .rule{height:10px;border-bottom:1px dashed #ddd;margin:6px 0 10px}
    .drawer nav a{display:block;padding:12px 8px;border-radius:8px;color:#222;font-size:15px}
    .drawer nav a:active{background:#f2f4f7}
    .drawer .lang-switch select{width:100%}

    /* 드로어 내 배너들: 중앙 정렬(요청 반영) */
    .drawer .lootbar-banner{align-items:center}
    .drawer .lootbar-banner img{height:20px}
    .drawer .lootbar-banner span{font-size:10px;opacity:.4;align-self:center;text-align:center}
    .drawer .cafe-banner{align-items:center;text-align:center}
    .drawer .cafe-banner img{height:60px}
    .drawer .cafe-banner span{font-size:10px;font-weight:300;margin-top:4px;color:#000;opacity:.4}

    /* 열림 상태 */
    .is-open .backdrop{opacity:1;pointer-events:auto}
    .is-open .drawer{transform:translateX(0)}
    .no-scroll{overflow:hidden}

    /* ===== 홈 카테고리: 모바일 1열 ===== */

  <!-- 바인딩 -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const sel = document.getElementById('langSelect');
      const selM = document.getElementById('langSelectMobile');

      function syncLang(val){ if (sel) sel.value=val; if (selM) selM.value=val; }
      function applyMeta(){
        if (!window.I18N) return;
        const d=document.querySelector('meta[name="description"]');
        const ogd=document.querySelector('meta[property="og:description"]');
        if (d) d.setAttribute('content', I18N.t('meta.description','KingshotData is a fanmade data site for Kingshot.'));
        if (ogd) ogd.setAttribute('content', I18N.t('og.description','All Kingshot data in one place! Buildings, Heroes, Calculators.'));
      }
      applyMeta(); if (window.I18N) syncLang(I18N.current);

      async function onLangChange(v){
        if (!window.I18N) return;
        await I18N.setLang(v);
        document.documentElement.setAttribute('lang', I18N.current);
        applyMeta();
        window.dispatchEvent(new HashChangeEvent('hashchange'));
      }
      sel?.addEventListener('change', e=>onLangChange(e.target.value));
      selM?.addEventListener('change', e=>onLangChange(e.target.value));

      // 라우터 초기 렌더 보장
      requestAnimationFrame(()=>window.dispatchEvent(new HashChangeEvent('hashchange')));

      // 드로어
      const html=document.documentElement, body=document.body;
      const drawer=document.getElementById('mobileDrawer');
      const backdrop=document.getElementById('backdrop');
      const btnOpen=document.getElementById('menuToggle');
      const btnClose=document.getElementById('btnClose');

      function openDrawer(){ html.classList.add('is-open'); body.classList.add('no-scroll'); backdrop.hidden=false; drawer.setAttribute('aria-hidden','false'); btnOpen.setAttribute('aria-expanded','true'); btnClose?.focus(); }
      function closeDrawer(){ html.classList.remove('is-open'); body.classList.remove('no-scroll'); backdrop.hidden=true; drawer.setAttribute('aria-hidden','true'); btnOpen.setAttribute('aria-expanded','false'); btnOpen.focus(); }

      btnOpen?.addEventListener('click', openDrawer);
      btnClose?.addEventListener('click', closeDrawer);
      backdrop?.addEventListener('click', closeDrawer);
      window.addEventListener('keydown', e=>{ if(e.key==='Escape') closeDrawer(); });
      drawer.querySelectorAll('a[data-link]').forEach(a=>a.addEventListener('click', closeDrawer));
    });
  </script>
