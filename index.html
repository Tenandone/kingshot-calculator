  <script>
    (function(){
      function normalizeLang(code){
        var low = String(code || '').trim().toLowerCase();
        if (low === 'ko') return 'ko';
        if (low === 'en') return 'en';
        if (low === 'ja') return 'ja';
        if (low === 'tw' || low === 'zh-tw' || low === 'zh_tw') return 'zh-TW';
        if (low === 'cn' || low === 'zh-cn' || low === 'zh_cn') return 'en';
        return 'en';
      }

      function broadcastChanged(){
        try { document.dispatchEvent(new CustomEvent('i18n:changed')); } catch(_){}
        try { document.dispatchEvent(new Event('i18n:changed')); } catch(_){}
      }

      function setHtmlLang(lang){
        document.documentElement.setAttribute('lang', lang);
      }

      function setUrlParamLang(lang){
        try{
          var url = new URL(window.location.href);
          url.searchParams.set('lang', lang);
          history.replaceState(null, '', url.toString());
        }catch(_){}
      }

      async function setLang(lang, opts){
        opts = opts || {};
        lang = normalizeLang(lang);

        if (window.I18N && typeof window.I18N.setLang === 'function') {
          await window.I18N.setLang(lang);
        }

        setHtmlLang(lang);

        if (!opts.noStore) {
          try { localStorage.setItem('lang', lang); } catch(_){}
        }

        if (!opts.noUrl) setUrlParamLang(lang);

        try { window.KD_SEO_SYNC && window.KD_SEO_SYNC(); } catch(_){}
        broadcastChanged();

        return lang;
      }

      function init(){
        var sp = new URLSearchParams(location.search);
        var urlLangRaw = sp.get('lang');
        var savedRaw = null;

        try { savedRaw = localStorage.getItem('lang'); } catch(_){}

        var initial = normalizeLang(urlLangRaw || savedRaw || 'en');
        setHtmlLang(initial);

        if (window.I18N && typeof window.I18N.init === 'function') {
          window.I18N.init({ lang: initial, supported: ['ko','en','ja','zh-TW'] });
        }

        try{
          if (urlLangRaw && normalizeLang(urlLangRaw) !== urlLangRaw) {
            setUrlParamLang(initial);
          }
        }catch(_){}

        try{
          if (savedRaw && normalizeLang(savedRaw) !== savedRaw) {
            localStorage.setItem('lang', initial);
          }
        }catch(_){}

        try { window.KD_SEO_SYNC && window.KD_SEO_SYNC(); } catch(_){}
        broadcastChanged();

        return initial;
      }

      window.KD_LANG = {
        normalize: normalizeLang,
        init: init,
        set: setLang,
        broadcast: broadcastChanged
      };
    })();

    function normalizeLang(code){
      return (window.KD_LANG && window.KD_LANG.normalize)
        ? window.KD_LANG.normalize(code)
        : 'en';
    }

    (function () {
      window.KD_LANG && window.KD_LANG.init && window.KD_LANG.init();
    })();

    async function applyLang(lang){
      if (window.KD_LANG && window.KD_LANG.set) return window.KD_LANG.set(lang);
      return normalizeLang(lang);
    }
  </script>

  <!-- SEO HEAD SYNC -->
  <script>
    (function(){
      var ORIGIN = 'https://kingshotdata.kr';

      function langToPath(code){
        var l = String(code || '').trim();
        if (l === 'zh-TW') return 'zh-tw';
        l = l.toLowerCase();
        if (l === 'zh-tw' || l === 'tw') return 'zh-tw';
        if (l === 'ko' || l === 'en' || l === 'ja') return l;
        return 'en';
      }

      function getLangPath(){
        var htmlLang = document.documentElement.getAttribute('lang') || 'en';
        return langToPath(htmlLang);
      }

      function stripLangPrefix(pathname){
        return pathname.replace(/^\/(en|ja|zh-tw)(\/|$)/i, '/');
      }

      function buildUrlFor(langPath, basePath, search){
        var p = (langPath === 'ko')
          ? basePath
          : ('/' + langPath + basePath.replace(/^\//, '/'));
        p = p.replace(/\/{2,}/g, '/');
        return ORIGIN + p + (search || '');
      }

      function upsertLink(rel, attrs){
        var sel = 'link[rel="' + rel + '"]';
        var el = document.querySelector(sel);
        if (!el) {
          el = document.createElement('link');
          el.setAttribute('rel', rel);
          document.head.appendChild(el);
        }
        Object.keys(attrs).forEach(function(k){
          el.setAttribute(k, attrs[k]);
        });
        return el;
      }

      function upsertMeta(propOrName, key, value){
        var sel = propOrName + '="' + key + '"';
        var el = document.querySelector('meta[' + sel + ']');
        if (!el) {
          el = document.createElement('meta');
          el.setAttribute(propOrName, key);
          document.head.appendChild(el);
        }
        el.setAttribute('content', value);
        return el;
      }

      function clearHreflang(){
        var nodes = document.querySelectorAll('link[rel="alternate"][hreflang][data-kd-hreflang="1"]');
        Array.prototype.forEach.call(nodes, function(n){
          if (n.parentNode) n.parentNode.removeChild(n);
        });
      }

      function addHreflang(hreflang, href){
        var el = document.createElement('link');
        el.setAttribute('rel', 'alternate');
        el.setAttribute('hreflang', hreflang);
        el.setAttribute('href', href);
        el.setAttribute('data-kd-hreflang', '1');
        document.head.appendChild(el);
      }

      function sync(){
        var basePath = stripLangPrefix(location.pathname);
        var search = location.search || '';
        var curLangPath = getLangPath();

        var canonical = buildUrlFor(curLangPath, basePath, search);
        upsertLink('canonical', { href: canonical });
        upsertMeta('property', 'og:url', canonical);

        clearHreflang();
        addHreflang('x-default', buildUrlFor('en', basePath, search));
        addHreflang('ko', buildUrlFor('ko', basePath, search));
        addHreflang('en', buildUrlFor('en', basePath, search));
        addHreflang('ja', buildUrlFor('ja', basePath, search));
        addHreflang('zh-TW', buildUrlFor('zh-tw', basePath, search));
      }

      window.KD_SEO_SYNC = sync;

      try { sync(); } catch(_) {}

      (function(){
        var _ps = history.pushState;
        var _rs = history.replaceState;

        function after(){
          try { sync(); } catch(_) {}
        }

        history.pushState = function(){
          var r = _ps.apply(this, arguments);
          after();
          return r;
        };

        history.replaceState = function(){
          var r = _rs.apply(this, arguments);
          after();
          return r;
        };

        window.addEventListener('popstate', after);
        document.addEventListener('i18n:changed', after);
      })();
    })();
  </script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var html = document.documentElement;
      var body = document.body;
      var drawer = document.getElementById('mobileDrawer');
      var backdrop = document.getElementById('backdrop');
      var btnOpen = document.getElementById('menuToggle');
      var btnClose = document.getElementById('btnClose');

      function openDrawer(){
        html.classList.add('is-open');
        body.classList.add('no-scroll');
        backdrop.hidden = false;
        drawer.setAttribute('aria-hidden', 'false');
        if (btnOpen) btnOpen.setAttribute('aria-expanded', 'true');
        if (btnClose) btnClose.focus();
      }

      function closeDrawer(){
        html.classList.remove('is-open');
        body.classList.remove('no-scroll');
        backdrop.hidden = true;
        drawer.setAttribute('aria-hidden', 'true');
        if (btnOpen) btnOpen.setAttribute('aria-expanded', 'false');
        if (btnOpen) btnOpen.focus();
      }

      if (btnOpen) btnOpen.addEventListener('click', openDrawer);
      if (btnClose) btnClose.addEventListener('click', closeDrawer);
      if (backdrop) backdrop.addEventListener('click', closeDrawer);

      window.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeDrawer();
      });

      var links = drawer ? drawer.querySelectorAll('a[data-link]') : [];
      Array.prototype.forEach.call(links, function(a){
        a.addEventListener('click', closeDrawer);
      });
    });
  </script>

  <script>
    (function(){
      var LANGS = [
        { code:'en', label:'EN' },
        { code:'ko', label:'KO' },
        { code:'ja', label:'JA' },
        { code:'zh-TW', label:'TW' }
      ];

      function getCurrentLang(){
        return normalizeLang(
          (window.I18N && window.I18N.current) ||
          document.documentElement.getAttribute('lang') ||
          'en'
        );
      }

      function render(root){
        if (!root) return;
        var cur = getCurrentLang();
        root.innerHTML = LANGS.map(function(l){
          return ''
            + '<button type="button" class="lang-pill" data-lang="' + l.code + '" aria-current="' + (l.code === cur ? 'true' : 'false') + '">'
            +   l.label
            + '</button>';
        }).join('');
      }

      async function onClick(e){
        var btn = e.target.closest && e.target.closest('.lang-pill[data-lang]');
        if (!btn) return;
        e.preventDefault();
        await applyLang(btn.getAttribute('data-lang'));
        syncAll();
      }

      function syncAll(){
        render(document.getElementById('langDropdownHeader'));
        render(document.getElementById('langDropdownDrawer'));
      }

      document.addEventListener('DOMContentLoaded', function () {
        syncAll();

        var h = document.getElementById('langDropdownHeader');
        var d = document.getElementById('langDropdownDrawer');

        if (h) h.addEventListener('click', onClick);
        if (d) d.addEventListener('click', onClick);

        document.addEventListener('i18n:changed', syncAll);
      });
    })();
  </script>
