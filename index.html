  <script src="/js/i18n.js?v=202509131858"></script>
  <script>
    // =========================================================
    // ✅ KD_LANG — SINGLE SOURCE OF TRUTH (유지보수 통일 규칙)
    // - 언어 정규화/선택/저장/URL반영 + "i18n:changed" 브로드캐스트
    // - 커스텀 위젯은 document.addEventListener('i18n:changed', ...)만 듣고 갱신
    // =========================================================
    (function(){
      function normalizeLang(code){
        var low = String(code || '').trim().toLowerCase();
        if (low === 'ko') return 'ko';
        if (low === 'en') return 'en';
        if (low === 'ja') return 'ja';
        if (low === 'tw' || low === 'zh-tw' || low === 'zh_tw') return 'zh-TW';
        // CN은 사이트에서 제거했으니 들어오면 EN으로 폴백만 (안전장치)
        if (low === 'cn' || low === 'zh-cn' || low === 'zh_cn') return 'en';
        return 'en';
      }

      function broadcastChanged(){
        // ✅ 모든 커스텀 위젯/컴포넌트가 이 이벤트 하나만 구독하면 됨
        try { document.dispatchEvent(new CustomEvent('i18n:changed')); } catch(_){}
        try { document.dispatchEvent(new Event('i18n:changed')); } catch(_){}
      }

      function setHtmlLang(lang){
        document.documentElement.setAttribute('lang', lang);
      }

      function setUrlParamLang(lang){
        try{
          var url = new URL(window.location.href);
          url.searchParams.set('lang', lang);
          history.replaceState(null, '', url.toString());
        }catch(_){}
      }

      async function setLang(lang, opts){
        opts = opts || {};
        lang = normalizeLang(lang);

        // 1) i18n 엔진 적용
        if (window.I18N && typeof window.I18N.setLang === 'function') {
          await window.I18N.setLang(lang);
        }

        // 2) DOM/스토리지/URL 반영
        setHtmlLang(lang);
        if (!opts.noStore) {
          try { localStorage.setItem('lang', lang); } catch(_){}
        }
        if (!opts.noUrl) setUrlParamLang(lang);

        // 3) SEO Sync + Broadcast
        try { window.KD_SEO_SYNC && window.KD_SEO_SYNC(); } catch(_){}
        broadcastChanged();

        return lang;
      }

      function init(){
        var sp = new URLSearchParams(location.search);
        var urlLangRaw = sp.get('lang');
        var savedRaw = null; try { savedRaw = localStorage.getItem('lang'); } catch(_){}

        var initial = normalizeLang(urlLangRaw || savedRaw || 'en');
        setHtmlLang(initial);

        if (window.I18N && typeof window.I18N.init === 'function') {
          window.I18N.init({ lang: initial, supported: ['ko','en','ja','zh-TW'] });
        }

        // URL lang가 이상한 형태면 normalize된 값으로 정리
        try{
          if (urlLangRaw && normalizeLang(urlLangRaw) !== urlLangRaw) {
            setUrlParamLang(initial);
          }
        }catch(_){}

        // 스토리지 값도 정규화
        try{
          if (savedRaw && normalizeLang(savedRaw) !== savedRaw) {
            localStorage.setItem('lang', initial);
          }
        }catch(_){}

        // ✅ 최초 로딩에서도 커스텀 위젯 즉시 갱신
        try { window.KD_SEO_SYNC && window.KD_SEO_SYNC(); } catch(_){}
        broadcastChanged();

        return initial;
      }

      // 전역 API (유지보수 통일 규칙)
      window.KD_LANG = {
        normalize: normalizeLang,
        init: init,
        set: setLang,
        broadcast: broadcastChanged
      };
    })();

    // 기존 코드 호환: normalizeLang / applyLang 유지
    function normalizeLang(code){
      return (window.KD_LANG && window.KD_LANG.normalize) ? window.KD_LANG.normalize(code) : 'en';
    }

    (function () {
      // KD_LANG.init에서 I18N.init + 이벤트 브로드캐스트까지 처리
      window.KD_LANG && window.KD_LANG.init && window.KD_LANG.init();
    })();

    async function applyLang(lang){
      // 통일 규칙: 언어 변경은 KD_LANG.set 하나로 끝
      if (window.KD_LANG && window.KD_LANG.set) return window.KD_LANG.set(lang);
      return normalizeLang(lang);
    }
  </script>

  <!-- ✅ SEO HEAD SYNC (canonical / og:url / hreflang) — EN is x-default -->
  <script>
    (function(){
      var ORIGIN = 'https://kingshotdata.kr';

      function langToPath(code){
        var l = String(code || '').trim();
        if (l === 'zh-TW') return 'zh-tw';
        l = l.toLowerCase();
        if (l === 'zh-tw' || l === 'tw') return 'zh-tw';
        if (l === 'ko' || l === 'en' || l === 'ja') return l;
        return 'en';
      }
      function getLangPath(){
        var htmlLang = document.documentElement.getAttribute('lang') || 'en';
        return langToPath(htmlLang);
      }
      function stripLangPrefix(pathname){
        return pathname.replace(/^\/(en|ja|zh-tw)(\/|$)/i, '/');
      }
      function buildUrlFor(langPath, basePath, search){
        var p = (langPath === 'ko') ? basePath : ('/' + langPath + basePath.replace(/^\//,'/'));
        p = p.replace(/\/{2,}/g, '/');
        return ORIGIN + p + (search || '');
      }

      function upsertLink(rel, attrs){
        var sel = 'link[rel="' + rel + '"]';
        var el = document.querySelector(sel);
        if (!el) {
          el = document.createElement('link');
          el.setAttribute('rel', rel);
          document.head.appendChild(el);
        }
        Object.keys(attrs).forEach(function(k){ el.setAttribute(k, attrs[k]); });
        return el;
      }
      function upsertMeta(propOrName, key, value){
        var sel = propOrName + '="' + key + '"';
        var el = document.querySelector('meta[' + sel + ']');
        if (!el) {
          el = document.createElement('meta');
          el.setAttribute(propOrName, key);
          document.head.appendChild(el);
        }
        el.setAttribute('content', value);
        return el;
      }

      function clearHreflang(){
        var nodes = document.querySelectorAll('link[rel="alternate"][hreflang][data-kd-hreflang="1"]');
        nodes.forEach(function(n){ n.parentNode && n.parentNode.removeChild(n); });
      }
      function addHreflang(hreflang, href){
        var el = document.createElement('link');
        el.setAttribute('rel','alternate');
        el.setAttribute('hreflang', hreflang);
        el.setAttribute('href', href);
        el.setAttribute('data-kd-hreflang','1');
        document.head.appendChild(el);
      }

      function sync(){
        var basePath = stripLangPrefix(location.pathname);
        var search = location.search || '';
        var curLangPath = getLangPath();

        var canonical = buildUrlFor(curLangPath, basePath, search);
        upsertLink('canonical', { href: canonical });
        upsertMeta('property','og:url', canonical);

        clearHreflang();
        addHreflang('x-default', buildUrlFor('en', basePath, search));
        addHreflang('ko',    buildUrlFor('ko',    basePath, search));
        addHreflang('en',    buildUrlFor('en',    basePath, search));
        addHreflang('ja',    buildUrlFor('ja',    basePath, search));
        addHreflang('zh-TW', buildUrlFor('zh-tw', basePath, search));
      }

      window.KD_SEO_SYNC = sync;

      try { sync(); } catch(_) {}
      (function(){
        var _ps = history.pushState;
        var _rs = history.replaceState;
        function after(){ try { sync(); } catch(_) {} }
        history.pushState = function(){ var r=_ps.apply(this, arguments); after(); return r; };
        history.replaceState = function(){ var r=_rs.apply(this, arguments); after(); return r; };
        window.addEventListener('popstate', after);
        document.addEventListener('i18n:changed', after);
      })();
    })();
  </script>

  <!-- drawer toggle (unchanged) -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const html = document.documentElement, body = document.body;
      const drawer = document.getElementById('mobileDrawer');
      const backdrop = document.getElementById('backdrop');
      const btnOpen = document.getElementById('menuToggle');
      const btnClose = document.getElementById('btnClose');

      function openDrawer(){
        html.classList.add('is-open');
        body.classList.add('no-scroll');
        backdrop.hidden = false;
        drawer.setAttribute('aria-hidden','false');
        btnOpen?.setAttribute('aria-expanded','true');
        btnClose?.focus();
      }
      function closeDrawer(){
        html.classList.remove('is-open');
        body.classList.remove('no-scroll');
        backdrop.hidden = true;
        drawer.setAttribute('aria-hidden','true');
        btnOpen?.setAttribute('aria-expanded','false');
        btnOpen?.focus();
      }

      btnOpen?.addEventListener('click', openDrawer);
      btnClose?.addEventListener('click', closeDrawer);
      backdrop?.addEventListener('click', closeDrawer);
      window.addEventListener('keydown', e => { if(e.key === 'Escape') closeDrawer(); });
      drawer.querySelectorAll('a[data-link]')?.forEach(a => a.addEventListener('click', closeDrawer));
    });
  </script>

  <!-- language pills (unchanged) -->
  <script>
    (function(){
      const LANGS = [
        {code:'en',    label:'EN'},
        {code:'ko',    label:'KO'},
        {code:'ja',    label:'JA'},
        {code:'zh-TW', label:'TW'},
      ];

      function getCurrentLang(){
        return normalizeLang(window.I18N?.current || document.documentElement.getAttribute('lang') || 'en');
      }
      function render(root){
        if (!root) return;
        const cur = getCurrentLang();
        root.innerHTML = LANGS.map(l => (
          '<button type="button" class="lang-pill" data-lang="' + l.code + '" aria-current="' + (l.code===cur ? 'true':'false') + '">' +
            l.label +
          '</button>'
        )).join('');
      }
      async function onClick(e){
        const btn = e.target.closest && e.target.closest('.lang-pill[data-lang]');
        if (!btn) return;
        e.preventDefault();
        await applyLang(btn.getAttribute('data-lang'));
        syncAll();
      }
      function syncAll(){
        render(document.getElementById('langDropdownHeader'));
        render(document.getElementById('langDropdownDrawer'));
      }

      document.addEventListener('DOMContentLoaded', () => {
        syncAll();
        const h = document.getElementById('langDropdownHeader');
        const d = document.getElementById('langDropdownDrawer');
        h && h.addEventListener('click', onClick);
        d && d.addEventListener('click', onClick);
        document.addEventListener('i18n:changed', syncAll);
      });
    })();
  </script>

  <!-- ✅ ONE DOM clock script -->
  <script>
    (function(){
      const els = {
        bar: document.getElementById('liveBar'),
        go: document.getElementById('kbGo'),

        title: document.getElementById('kbTitle'),
        sub: document.getElementById('kbSub'),
        lCoupons: document.getElementById('kbLCoupons'),
        lNext: document.getElementById('kbLNext'),
        lNow: document.getElementById('kbLNow'),

        vCoupons: document.getElementById('kbCoupons'),
        vNext: document.getElementById('kbNext'),
        vNow: document.getElementById('kbNow'),
      };

      let targetNextMs = null;
      let tickTimer = null;
      let cachedCount = 0;

      const TXT = {
        ko: { title:"킹샷 쿠폰 타이머", coupons:"쿠폰", next:"만료까지", now:"현재시간", suffix:"개 활성" },
        en: { title:"Kingshot Coupon Timer", coupons:"Coupons", next:"To expiry", now:"Now", suffix:"active" },
        ja: { title:"キングショット クーポンタイマー", coupons:"クーポン", next:"期限まで", now:"現在", suffix:"件 有効" },
        "zh-TW": { title:"Kingshot 優惠碼倒數", coupons:"優惠碼", next:"距到期", now:"目前時間", suffix:"個可用" }
      };

      function curLang(){
        const l = (document.documentElement.getAttribute('lang') || 'en').trim();
        if (l === 'ko' || l === 'en' || l === 'ja' || l === 'zh-TW') return l;
        const low = l.toLowerCase();
        if (low === 'zh-tw' || low === 'tw') return 'zh-TW';
        return 'en';
      }
      function t(k){
        const l = curLang();
        return (TXT[l] && TXT[l][k]) || (TXT.en && TXT.en[k]) || k;
      }

      function safeStr(v){ return (v==null ? "" : String(v)); }

      function parseExpiryMs(c){
        const iso = safeStr(c && c.expiresAt).trim();
        if(iso){
          const t = Date.parse(iso);
          if(Number.isFinite(t)) return t;
        }
        const until = safeStr(c && c.until).trim();
        if(until){
          const parts = until.split("-");
          if(parts.length===3){
            const y=parts[0];
            const m=String(parts[1]).padStart(2,"0");
            const d=String(parts[2]).padStart(2,"0");
            const t = Date.parse(`${y}-${m}-${d}T00:00:00Z`);
            if(Number.isFinite(t)) return t;
          }
        }
        return null;
      }

      function isActive(c, nowMs){
        const exp = parseExpiryMs(c);
        if(exp == null) return false;
        if(nowMs >= exp) return false;

        const st = safeStr(c && c.startAt).trim();
        if(st){
          const stMs = Date.parse(st);
          if(Number.isFinite(stMs) && nowMs < stMs) return false;
        }
        return true;
      }

      function fmt2(n){ return String(n).padStart(2,'0'); }
      function clockNow(dt){ return `${fmt2(dt.getHours())}:${fmt2(dt.getMinutes())}:${fmt2(dt.getSeconds())}`; }
      function countdown(ms){
        let sec = Math.max(0, Math.floor(ms / 1000));
        const d = Math.floor(sec / 86400); sec %= 86400;
        const h = Math.floor(sec / 3600);  sec %= 3600;
        const m = Math.floor(sec / 60);    sec %= 60;
        if (d > 0) return `${d}d ${fmt2(h)}:${fmt2(m)}:${fmt2(sec)}`;
        return `${fmt2(h)}:${fmt2(m)}:${fmt2(sec)}`;
      }

      async function loadCoupons(){
        const url = '/data/coupons.json?v=' + Date.now();
        const res = await fetch(url, { cache:'no-store' });
        if(!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        return Array.isArray(data?.coupons) ? data.coupons : (Array.isArray(data) ? data : []);
      }

      function computeNextExpiry(active){
        let min = null;
        for(const c of active){
          const ms = parseExpiryMs(c);
          if(ms == null) continue;
          if(min === null || ms < min) min = ms;
        }
        return min;
      }

      function applyText(){
        if(els.title) els.title.textContent = t('title');
        if(els.sub) els.sub.textContent = '';
        if(els.lCoupons) els.lCoupons.textContent = t('coupons');
        if(els.lNext) els.lNext.textContent = t('next');
        if(els.lNow) els.lNow.textContent = t('now');
      }

      function renderCount(){
        if(!els.vCoupons) return;
        const l = curLang();
        const sfx = t('suffix');
        els.vCoupons.textContent = (l === 'en') ? `${cachedCount} ${sfx}` : `${cachedCount}${sfx}`;
      }

      function syncLink(){
        const l = curLang();
        const url = `/tools/coupon-countdown.html?lang=${encodeURIComponent(l)}`;
        if(els.go) els.go.href = url;
      }

      function tick(){
        const now = new Date();
        if(els.vNow) els.vNow.textContent = clockNow(now);

        if(els.vNext){
          if(!targetNextMs) els.vNext.textContent = '—';
          else {
            const diff = targetNextMs - Date.now();
            els.vNext.textContent = (diff <= 0) ? '00:00:00' : countdown(diff);
          }
        }
      }

      async function init(){
        try{
          applyText();
          syncLink();

          const list = await loadCoupons();
          const nowMs = Date.now();
          const active = list.filter(c => c?.code && isActive(c, nowMs));

          cachedCount = active.length;
          renderCount();

          targetNextMs = computeNextExpiry(active);

          if(tickTimer) clearInterval(tickTimer);
          tick();
          tickTimer = setInterval(tick, 1000);

          if(els.bar) els.bar.hidden = false;

          document.addEventListener('i18n:changed', () => {
            applyText();
            renderCount();
            syncLink();
          });

        }catch(_e){
          if(els.bar) els.bar.hidden = true;
          if(tickTimer) clearInterval(tickTimer);
        }
      }

      document.addEventListener('DOMContentLoaded', init);
    })();
  </script>
